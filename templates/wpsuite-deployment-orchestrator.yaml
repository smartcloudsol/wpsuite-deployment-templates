        AdminCognitoAuthScopes: ""
        PayloadBucketName: ""
        TemplatesBucketName: ""
        FromEmail: ""
        EnableRecaptcha: "false"
        RecaptchaMode: "enterprise"
        RecaptchaProjectId: ""
        RecaptchaSiteKey: ""
        RecaptchaSecretKey: ""
        RecaptchaScoreThreshold: "0.5"
        EnableWAF: "false"
        EnableKmsForSecrets: "false"
