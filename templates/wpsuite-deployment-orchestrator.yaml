        PayloadPrefix: ""
        TemplatesPrefix: ""
        DefaultWebhookSigningSecret: ""
        ApiCustomDomainName: ""
        AcmCertificateArn: ""
        EnableRoute53: ""
        EnableGuardDutyMalwareProtection: ""
        LambdaMemorySize: ""
        LambdaTimeout: ""
        LogLevel: ""
