AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Deployment Access root orchestration template for AWS Marketplace Quick Launch"
Parameters:
  MPS3BucketName:
    Type: "String"
    Default: "wpsuite-marketplace-templates-us-east-1"
    Description: "Marketplace-provided bucket that contains the reviewed WP Suite templates."
  MPS3BucketRegion:
    Type: "String"
    Default: "us-east-1"
    Description: "Marketplace-provided bucket region that contains the reviewed WP Suite templates."
  MPS3KeyPrefix:
    Type: "String"
    Default: "deployment-access/v0.1.0"
    Description: "Marketplace-provided key prefix for the reviewed WP Suite templates."
  WpSuiteDeploymentSecretArn:
    Type: "String"
    Default: ""
    Description: "AWS Marketplace Deployment Service secret ARN containing the WP Suite deployment context."
    NoEcho: true
  DeploymentContextMode:
    Type: "String"
    Default: "marketplace_secret"
    AllowedValues:
      - "marketplace_secret"
      - "direct"
    Description: "How the root template receives the WP Suite deployment context."
  WpSuiteDeploymentId:
    Type: "String"
    Default: ""
    Description: "Direct deployment session ID used by agency-credit CloudFormation launches."
    NoEcho: true
  WpSuiteDeploymentNonce:
    Type: "String"
    Default: ""
    Description: "Direct deployment nonce used by agency-credit CloudFormation launches."
    NoEcho: true
  WpSuiteExpectedAwsAccountId:
    Type: "String"
    Default: ""
    Description: "Expected buyer AWS account ID."
  WpSuiteBackendApiBaseUrl:
    Type: "String"
    Default: "https://api.wpsuite.io/marketplace"
    Description: "WP Suite Marketplace backend API base URL."
  TemplateVersion:
    Type: "String"
    Default: "v0.1.0"
    Description: "Immutable WP Suite deployment template version."
  DeployCognito:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite Cognito identity foundation."
  DeployAiKitBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite AI Kit backend."
  DeployFlowBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite Flow backend."
  DeployStaticGuardian:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite Static Site Guardian."
  StaticGuardianDomainName:
    Type: "String"
    Default: ""
    Description: "Custom domain for the Static Site Guardian CloudFront distribution."
  StaticGuardianCertificateArn:
    Type: "String"
    Default: ""
    Description: "ACM certificate ARN in us-east-1 for the Static Site Guardian CloudFront distribution."
  StaticGuardianProtectedPaths:
    Type: "String"
    Default: "/restricted"
    Description: "Comma-separated protected paths for Static Site Guardian."
  StaticGuardianSigninPagePath:
    Type: "String"
    Default: "/signin"
    Description: "Sign-in path used by Static Site Guardian."
  IdentityMode:
    Type: "String"
    Default: "none"
    AllowedValues:
      - "create"
      - "existing"
      - "none"
    Description: "Identity source selected by the WP Suite deployment wizard."
  ExistingUserPoolId:
    Type: "String"
    Default: ""
    Description: "Existing Cognito User Pool ID when IdentityMode is existing."
  ExistingUserPoolClientId:
    Type: "String"
    Default: ""
    Description: "Existing Cognito User Pool client ID when IdentityMode is existing."
  ExistingIdentityPoolId:
    Type: "String"
    Default: ""
    Description: "Existing Cognito Identity Pool ID when IdentityMode is existing."
  LogRetentionDays:
    Type: "Number"
    Default: 14
    Description: "CloudWatch Logs retention in days for orchestration and nested resources."
Conditions:
  CondDeployCognito:
    Fn::Equals:
      -
        Ref: "DeployCognito"
      - "true"
  CondDeployAiKitBackend:
    Fn::Equals:
      -
        Ref: "DeployAiKitBackend"
      - "true"
  CondDeployFlowBackend:
    Fn::Equals:
      -
        Ref: "DeployFlowBackend"
      - "true"
  CondDeployStaticGuardian:
    Fn::Equals:
      -
        Ref: "DeployStaticGuardian"
      - "true"
  CondUseMarketplaceSecret:
    Fn::Equals:
      -
        Ref: "DeploymentContextMode"
      - "marketplace_secret"
  CondCreateIdentity:
    Fn::And:
      -
        Fn::Equals:
          -
            Ref: "IdentityMode"
          - "create"
      -
        Fn::Equals:
          -
            Ref: "DeployCognito"
          - "true"
Resources:
  DeploymentArtifactBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          -
            ServerSideEncryptionByDefault:
              SSEAlgorithm: "AES256"
      LifecycleConfiguration:
        Rules:
          -
            ExpirationInDays: 30
            Id: "ExpireStagedArtifacts"
            Status: "Enabled"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  DeploymentArtifactBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket:
        Ref: "DeploymentArtifactBucket"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Sid: "DenyInsecureTransport"
            Effect: "Deny"
            Principal: "*"
            Action: "s3:*"
            Resource:
              -
                Fn::Sub:
                  - "arn:${AWS::Partition}:s3:::${Bucket}"
                  -
                    Bucket:
                      Ref: "DeploymentArtifactBucket"
              -
                Fn::Sub:
                  - "arn:${AWS::Partition}:s3:::${Bucket}/*"
                  -
                    Bucket:
                      Ref: "DeploymentArtifactBucket"
            Condition:
              Bool:
                aws:SecureTransport: "false"
  ArtifactStagerFunctionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
          PolicyName: "ArtifactStagerLogs"
  ArtifactStagerReadDeploymentSecretPolicy:
    Type: "AWS::IAM::Policy"
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Action:
              - "secretsmanager:GetSecretValue"
            Resource:
              Ref: "WpSuiteDeploymentSecretArn"
      PolicyName: "ReadDeploymentSecret"
      Roles:
        -
          Ref: "ArtifactStagerFunctionRole"
    Condition: "CondUseMarketplaceSecret"
  ArtifactStagerFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      Code:
        ZipFile: "\nconst https = require(\"https\");\nconst url = require(\"url\");\nconst { SecretsManagerClient, GetSecretValueCommand } = require(\"@aws-sdk/client-secrets-manager\");\n\nfunction requestJson(endpoint, body) {\n  return new Promise((resolve, reject) => {\n    const parsed = new url.URL(endpoint);\n    const payload = JSON.stringify(body);\n    const req = https.request({\n      hostname: parsed.hostname,\n      path: parsed.pathname + parsed.search,\n      method: \"POST\",\n      headers: {\n        \"content-type\": \"application/json\",\n        \"content-length\": Buffer.byteLength(payload)\n      }\n    }, (res) => {\n      let data = \"\";\n      res.on(\"data\", (chunk) => { data += chunk; });\n      res.on(\"end\", () => {\n        if (res.statusCode < 200 || res.statusCode >= 300) {\n          reject(new Error(\"WP Suite backend returned \" + res.statusCode));\n          return;\n        }\n        resolve(data ? JSON.parse(data) : {});\n      });\n    });\n    req.on(\"error\", reject);\n    req.write(payload);\n    req.end();\n  });\n}\n\nfunction sendResponse(event, context, status, data, physicalResourceId, reason) {\n  return new Promise((resolve, reject) => {\n    const body = JSON.stringify({\n      Status: status,\n      Reason: reason || (\"See CloudWatch Log Stream: \" + context.logStreamName),\n      PhysicalResourceId: physicalResourceId || context.logStreamName,\n      StackId: event.StackId,\n      RequestId: event.RequestId,\n      LogicalResourceId: event.LogicalResourceId,\n      NoEcho: false,\n      Data: data || {}\n    });\n    const parsed = new url.URL(event.ResponseURL);\n    const req = https.request({\n      hostname: parsed.hostname,\n      path: parsed.pathname + parsed.search,\n      method: \"PUT\",\n      headers: {\n        \"content-type\": \"\",\n        \"content-length\": Buffer.byteLength(body)\n      }\n    }, (res) => {\n      res.resume();\n      res.on(\"end\", resolve);\n    });\n    req.on(\"error\", reject);\n    req.write(body);\n    req.end();\n  });\n}\n\nasync function deploymentContext(props) {\n  if (props.DeploymentContextMode === \"direct\") {\n    if (!props.DeploymentId || !props.DeploymentNonce) {\n      throw new Error(\"Direct WP Suite deployment context is incomplete\");\n    }\n    return {\n      deploymentId: props.DeploymentId,\n      nonce: props.DeploymentNonce,\n      expectedAwsAccountId: props.ExpectedAwsAccountId || \"\"\n    };\n  }\n\n  if (!props.DeploymentSecretArn) {\n    throw new Error(\"WP Suite deployment secret ARN is missing\");\n  }\n\n  const secrets = new SecretsManagerClient({});\n  const secret = await secrets.send(new GetSecretValueCommand({\n    SecretId: props.DeploymentSecretArn\n  }));\n  if (!secret.SecretString) {\n    throw new Error(\"WP Suite deployment secret is empty\");\n  }\n\n  const parsed = JSON.parse(secret.SecretString);\n  if (!parsed.deploymentId || !parsed.nonce) {\n    throw new Error(\"WP Suite deployment secret is missing required fields\");\n  }\n  return parsed;\n}\n\nexports.handler = async (event, context) => {\n  const physicalResourceId = event.PhysicalResourceId || \"wpsuite-artifact-stager\";\n  try {\n    if (event.RequestType === \"Delete\") {\n      await sendResponse(event, context, \"SUCCESS\", {}, physicalResourceId);\n      return;\n    }\n\n    const props = event.ResourceProperties || {};\n    const deployment = await deploymentContext(props);\n    const currentAwsAccountId = context.invokedFunctionArn.split(\":\")[4];\n    const response = await requestJson(props.BackendStageArtifactUrl, {\n      requestType: event.RequestType,\n      stackId: event.StackId,\n      requestId: event.RequestId,\n      deploymentId: deployment.deploymentId,\n      nonce: deployment.nonce,\n      awsAccountId: deployment.expectedAwsAccountId || currentAwsAccountId,\n      templateVersion: props.TemplateVersion,\n      topology: props.Topology,\n      stagingBucket: props.TargetBucketName,\n      stagingPrefix: props.TargetPrefix,\n      targetBucketName: props.TargetBucketName,\n      targetPrefix: props.TargetPrefix,\n      region: process.env.AWS_REGION\n    });\n\n    await sendResponse(event, context, \"SUCCESS\", {\n      ArtifactRootPrefix: response.artifactRootPrefix || props.TargetPrefix,\n      TemplateVersion: response.templateVersion || props.TemplateVersion,\n      RuntimeConfigKey: response.runtimeConfigKey || \"\",\n      ManifestKey: response.manifestKey || \"\",\n      ManifestChecksum: response.manifestChecksum || \"\"\n    }, physicalResourceId);\n  } catch (error) {\n    await sendResponse(event, context, \"FAILED\", {}, physicalResourceId, error.message);\n  }\n};\n"
      Handler: "index.handler"
      MemorySize: 256
      Role:
        Fn::GetAtt:
          - "ArtifactStagerFunctionRole"
          - "Arn"
      Runtime: "nodejs24.x"
      Timeout: 900
  ArtifactStager:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "ArtifactStagerFunction"
          - "Arn"
      BackendStageArtifactUrl:
        Fn::Join:
          - ""
          -
            -
              Ref: "WpSuiteBackendApiBaseUrl"
            - "/deployment/stage-artifact"
      DeploymentContextMode:
        Ref: "DeploymentContextMode"
      DeploymentSecretArn:
        Ref: "WpSuiteDeploymentSecretArn"
      DeploymentId:
        Ref: "WpSuiteDeploymentId"
      DeploymentNonce:
        Ref: "WpSuiteDeploymentNonce"
      ExpectedAwsAccountId:
        Ref: "WpSuiteExpectedAwsAccountId"
      TemplateVersion:
        Ref: "TemplateVersion"
      TargetBucketName:
        Ref: "DeploymentArtifactBucket"
      TargetPrefix:
        Fn::Sub: "wpsuite-artifacts/${AWS::StackId}/"
      Topology:
        DeployCognito:
          Ref: "DeployCognito"
        DeployAiKitBackend:
          Ref: "DeployAiKitBackend"
        DeployFlowBackend:
          Ref: "DeployFlowBackend"
        DeployStaticGuardian:
          Ref: "DeployStaticGuardian"
        IdentityMode:
          Ref: "IdentityMode"
  CognitoNestedStack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      Parameters:
        TemplateVersion:
          Ref: "TemplateVersion"
        ArtifactBucketName:
          Ref: "DeploymentArtifactBucket"
        ArtifactRootPrefix:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ArtifactRootPrefix"
        RuntimeConfigKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "RuntimeConfigKey"
        ManifestKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestKey"
        ManifestChecksum:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestChecksum"
        LogRetentionDays:
          Ref: "LogRetentionDays"
      TemplateURL:
        Fn::Sub:
          - "https://${Bucket}.s3.${Region}.${AWS::URLSuffix}/${Prefix}/${TemplatePath}"
          -
            Bucket:
              Ref: "MPS3BucketName"
            Region:
              Ref: "MPS3BucketRegion"
            Prefix:
              Ref: "MPS3KeyPrefix"
            TemplatePath: "templates/wpsuite-cognito.yaml"
    DependsOn:
      - "ArtifactStager"
    Condition: "CondDeployCognito"
  AiKitBackendNestedStack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      Parameters:
        TemplateVersion:
          Ref: "TemplateVersion"
        ArtifactBucketName:
          Ref: "DeploymentArtifactBucket"
        ArtifactRootPrefix:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ArtifactRootPrefix"
        RuntimeConfigKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "RuntimeConfigKey"
        ManifestKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestKey"
        ManifestChecksum:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestChecksum"
        LogRetentionDays:
          Ref: "LogRetentionDays"
        DeploymentVersion:
          Ref: "TemplateVersion"
        ArtifactKeyPrefix:
          Fn::Join:
            - ""
            -
              -
                Fn::GetAtt:
                  - "ArtifactStager"
                  - "ArtifactRootPrefix"
              - "wpsuite-ai-kit"
        CognitoUserPoolId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolId"
            -
              Ref: "ExistingUserPoolId"
        CognitoUserPoolClientId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolClientId"
            -
              Ref: "ExistingUserPoolClientId"
        CognitoIdentityPoolId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.IdentityPoolId"
            -
              Ref: "ExistingIdentityPoolId"
        AdminCognitoUserPoolId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolId"
            -
              Ref: "ExistingUserPoolId"
        FrontendCognitoUserPoolId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolId"
            -
              Ref: "ExistingUserPoolId"
      TemplateURL:
        Fn::Sub:
          - "https://${Bucket}.s3.${Region}.${AWS::URLSuffix}/${Prefix}/${TemplatePath}"
          -
            Bucket:
              Ref: "MPS3BucketName"
            Region:
              Ref: "MPS3BucketRegion"
            Prefix:
              Ref: "MPS3KeyPrefix"
            TemplatePath: "templates/wpsuite-ai-kit-backend.yaml"
    DependsOn:
      - "ArtifactStager"
    Condition: "CondDeployAiKitBackend"
  FlowBackendNestedStack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      Parameters:
        TemplateVersion:
          Ref: "TemplateVersion"
        ArtifactBucketName:
          Ref: "DeploymentArtifactBucket"
        ArtifactRootPrefix:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ArtifactRootPrefix"
        RuntimeConfigKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "RuntimeConfigKey"
        ManifestKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestKey"
        ManifestChecksum:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestChecksum"
        LogRetentionDays:
          Ref: "LogRetentionDays"
        DeploymentVersion:
          Ref: "TemplateVersion"
        ArtifactKeyPrefix:
          Fn::Join:
            - ""
            -
              -
                Fn::GetAtt:
                  - "ArtifactStager"
                  - "ArtifactRootPrefix"
              - "wpsuite-flow"
        AdminCognitoUserPoolId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolId"
            -
              Ref: "ExistingUserPoolId"
        AdminCognitoAuthScopes: ""
      TemplateURL:
        Fn::Sub:
          - "https://${Bucket}.s3.${Region}.${AWS::URLSuffix}/${Prefix}/${TemplatePath}"
          -
            Bucket:
              Ref: "MPS3BucketName"
            Region:
              Ref: "MPS3BucketRegion"
            Prefix:
              Ref: "MPS3KeyPrefix"
            TemplatePath: "templates/wpsuite-flow-backend.yaml"
    DependsOn:
      - "ArtifactStager"
    Condition: "CondDeployFlowBackend"
  StaticGuardianNestedStack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      Parameters:
        TemplateVersion:
          Ref: "TemplateVersion"
        ArtifactBucketName:
          Ref: "DeploymentArtifactBucket"
        ArtifactRootPrefix:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ArtifactRootPrefix"
        RuntimeConfigKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "RuntimeConfigKey"
        ManifestKey:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestKey"
        ManifestChecksum:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ManifestChecksum"
        LogRetentionDays:
          Ref: "LogRetentionDays"
        DeploymentVersion:
          Ref: "TemplateVersion"
        ArtifactKeyPrefix:
          Fn::Join:
            - ""
            -
              -
                Fn::GetAtt:
                  - "ArtifactStager"
                  - "ArtifactRootPrefix"
              - "wpsuite-site-guardian"
        DomainName:
          Ref: "StaticGuardianDomainName"
        CertificateArn:
          Ref: "StaticGuardianCertificateArn"
        CognitoUserPoolId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolId"
            -
              Ref: "ExistingUserPoolId"
        CognitoUserPoolClientId:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolClientId"
            -
              Ref: "ExistingUserPoolClientId"
        CognitoAppClientIds:
          Fn::If:
            - "CondCreateIdentity"
            -
              Fn::GetAtt:
                - "CognitoNestedStack"
                - "Outputs.UserPoolClientId"
            -
              Ref: "ExistingUserPoolClientId"
        ProtectedPaths:
          Ref: "StaticGuardianProtectedPaths"
        SigninPagePath:
          Ref: "StaticGuardianSigninPagePath"
      TemplateURL:
        Fn::Sub:
          - "https://${Bucket}.s3.${Region}.${AWS::URLSuffix}/${Prefix}/${TemplatePath}"
          -
            Bucket:
              Ref: "MPS3BucketName"
            Region:
              Ref: "MPS3BucketRegion"
            Prefix:
              Ref: "MPS3KeyPrefix"
            TemplatePath: "templates/wpsuite-static-site-guardian.yaml"
    DependsOn:
      - "ArtifactStager"
    Condition: "CondDeployStaticGuardian"
  DeploymentOutputReporterFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      Code:
        ZipFile: "\nconst https = require(\"https\");\nconst url = require(\"url\");\nconst { SecretsManagerClient, GetSecretValueCommand } = require(\"@aws-sdk/client-secrets-manager\");\n\nfunction requestJson(endpoint, body) {\n  return new Promise((resolve, reject) => {\n    const parsed = new url.URL(endpoint);\n    const payload = JSON.stringify(body);\n    const req = https.request({\n      hostname: parsed.hostname,\n      path: parsed.pathname + parsed.search,\n      method: \"POST\",\n      headers: {\n        \"content-type\": \"application/json\",\n        \"content-length\": Buffer.byteLength(payload)\n      }\n    }, (res) => {\n      let data = \"\";\n      res.on(\"data\", (chunk) => { data += chunk; });\n      res.on(\"end\", () => {\n        if (res.statusCode < 200 || res.statusCode >= 300) {\n          reject(new Error(\"WP Suite backend returned \" + res.statusCode + (data ? \": \" + data : \"\")));\n          return;\n        }\n        resolve(data ? JSON.parse(data) : {});\n      });\n    });\n    req.on(\"error\", reject);\n    req.write(payload);\n    req.end();\n  });\n}\n\nfunction sendResponse(event, context, status, data, physicalResourceId, reason) {\n  return new Promise((resolve, reject) => {\n    const body = JSON.stringify({\n      Status: status,\n      Reason: reason || (\"See CloudWatch Log Stream: \" + context.logStreamName),\n      PhysicalResourceId: physicalResourceId || context.logStreamName,\n      StackId: event.StackId,\n      RequestId: event.RequestId,\n      LogicalResourceId: event.LogicalResourceId,\n      NoEcho: false,\n      Data: data || {}\n    });\n    const parsed = new url.URL(event.ResponseURL);\n    const req = https.request({\n      hostname: parsed.hostname,\n      path: parsed.pathname + parsed.search,\n      method: \"PUT\",\n      headers: {\n        \"content-type\": \"\",\n        \"content-length\": Buffer.byteLength(body)\n      }\n    }, (res) => {\n      res.resume();\n      res.on(\"end\", resolve);\n    });\n    req.on(\"error\", reject);\n    req.write(body);\n    req.end();\n  });\n}\n\nasync function deploymentContext(props) {\n  if (props.DeploymentContextMode === \"direct\") {\n    if (!props.DeploymentId || !props.DeploymentNonce) {\n      throw new Error(\"Direct WP Suite deployment context is incomplete\");\n    }\n    return {\n      deploymentId: props.DeploymentId,\n      nonce: props.DeploymentNonce\n    };\n  }\n\n  if (!props.DeploymentSecretArn) {\n    throw new Error(\"WP Suite deployment secret ARN is missing\");\n  }\n\n  const secrets = new SecretsManagerClient({});\n  const secret = await secrets.send(new GetSecretValueCommand({\n    SecretId: props.DeploymentSecretArn\n  }));\n  if (!secret.SecretString) {\n    throw new Error(\"WP Suite deployment secret is empty\");\n  }\n\n  const parsed = JSON.parse(secret.SecretString);\n  if (!parsed.deploymentId || !parsed.nonce) {\n    throw new Error(\"WP Suite deployment secret is missing required fields\");\n  }\n  return parsed;\n}\n\nexports.handler = async (event, context) => {\n  const physicalResourceId = event.PhysicalResourceId || \"wpsuite-deployment-output-reporter\";\n  try {\n    if (event.RequestType === \"Delete\") {\n      await sendResponse(event, context, \"SUCCESS\", {}, physicalResourceId);\n      return;\n    }\n\n    const props = event.ResourceProperties || {};\n    const deployment = await deploymentContext(props);\n    const endpoint = String(props.BackendApiBaseUrl || \"\").replace(/\\/$/, \"\") + \"/deployment/\" + encodeURIComponent(deployment.deploymentId) + \"/outputs\";\n    const response = await requestJson(endpoint, {\n      nonce: deployment.nonce,\n      stackId: event.StackId,\n      requestId: event.RequestId,\n      operation: event.RequestType,\n      region: process.env.AWS_REGION,\n      outputs: props.Outputs || {}\n    });\n\n    await sendResponse(event, context, \"SUCCESS\", {\n      DeploymentId: deployment.deploymentId,\n      OutputsHash: response.outputsHash || \"\",\n      CapturedAt: response.capturedAt || \"\"\n    }, physicalResourceId);\n  } catch (error) {\n    await sendResponse(event, context, \"FAILED\", {}, physicalResourceId, error.message);\n  }\n};\n"
      Handler: "index.handler"
      MemorySize: 256
      Role:
        Fn::GetAtt:
          - "ArtifactStagerFunctionRole"
          - "Arn"
      Runtime: "nodejs24.x"
      Timeout: 300
  DeploymentOutputReporter:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "DeploymentOutputReporterFunction"
          - "Arn"
      BackendApiBaseUrl:
        Ref: "WpSuiteBackendApiBaseUrl"
