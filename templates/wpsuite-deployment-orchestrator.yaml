AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Deployment Access root orchestration template for AWS Marketplace Quick Launch"
Parameters:
  MPS3BucketName:
    Type: "String"
    Default: "wpsuite-artifacts-637423296378-us-east-1-an"
    Description: "Public S3 bucket that contains the reviewed WP Suite CloudFormation templates."
  MPS3BucketRegion:
    Type: "String"
    Default: "us-east-1"
    Description: "Marketplace-provided bucket region that contains the reviewed WP Suite templates."
  MPS3KeyPrefix:
    Type: "String"
    Default: "releases/v1.0.30/templates/templates"
    Description: "S3 key prefix for the reviewed WP Suite nested CloudFormation templates."
  WpSuiteDeploymentSecretArn:
    Type: "String"
    Description: "AWS Marketplace Deployment Service secret ARN containing the WP Suite deployment context."
    MinLength: 1
    NoEcho: true
Mappings:
  WpSuiteMarketplace:
    DeploymentAccess:
      ProductCode: "5d8wq5hg1d54kb933ntenntiu"
Resources:
  DeploymentArtifactBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          -
            ServerSideEncryptionByDefault:
              SSEAlgorithm: "AES256"
      LifecycleConfiguration:
        Rules:
          -
            ExpirationInDays: 30
            Id: "ExpireStagedArtifacts"
            Status: "Enabled"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        -
          Key: "aws-apn-id"
          Value: "pc:5d8wq5hg1d54kb933ntenntiu"
  DeploymentArtifactBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket:
        Ref: "DeploymentArtifactBucket"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Sid: "DenyInsecureTransport"
            Effect: "Deny"
            Principal: "*"
            Action: "s3:*"
            Resource:
              -
                Fn::Sub:
                  - "arn:${AWS::Partition}:s3:::${Bucket}"
                  -
                    Bucket:
                      Ref: "DeploymentArtifactBucket"
              -
                Fn::Sub:
                  - "arn:${AWS::Partition}:s3:::${Bucket}/*"
                  -
                    Bucket:
                      Ref: "DeploymentArtifactBucket"
            Condition:
              Bool:
                aws:SecureTransport: "false"
  ArtifactIngressRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              AWS: "arn:aws:iam::637423296378:role/wpsuite-prod-marketplace-artifact-deployer"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                sts:ExternalId:
                  Ref: "AWS::StackId"
      Description: "Allows the WP Suite Marketplace backend to stage authorized runtime artifacts into this stack bucket."
      Path: "/wpsuite/deployment-access/"
      Policies:
        -
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action: "s3:PutObject"
                Resource:
                  Fn::Sub:
                    - "arn:${AWS::Partition}:s3:::${Bucket}/${Prefix}*"
                    -
                      Bucket:
                        Ref: "DeploymentArtifactBucket"
                      Prefix:
                        Fn::Sub: "wpsuite-artifacts/${AWS::StackId}/"
                Condition:
                  StringEquals:
                    s3:x-amz-server-side-encryption: "AES256"
              -
                Effect: "Allow"
                Action: "s3:PutObjectTagging"
                Resource:
                  Fn::Sub:
                    - "arn:${AWS::Partition}:s3:::${Bucket}/${Prefix}*"
                    -
                      Bucket:
                        Ref: "DeploymentArtifactBucket"
                      Prefix:
                        Fn::Sub: "wpsuite-artifacts/${AWS::StackId}/"
              -
                Effect: "Allow"
                Action: "cloudformation:CreateChangeSet"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*"
                Condition:
                  StringLike:
                    cloudformation:ChangeSetName: "wpsuite-update-*"
                    cloudformation:TemplateUrl: "https://wpsuite-artifacts-*-*-*.s3.*.amazonaws.com/releases/*/templates/wpsuite-deployment-orchestrator-direct.yaml"
              -
                Effect: "Allow"
                Action:
                  - "cloudformation:DescribeChangeSet"
                  - "cloudformation:DescribeStacks"
                  - "cloudformation:DescribeStackEvents"
                  - "cloudformation:DescribeStackResources"
                  - "cloudformation:GetTemplate"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*"
              -
                Effect: "Allow"
                Action: "cloudformation:ValidateTemplate"
                Resource: "*"
                Condition:
                  StringLike:
                    cloudformation:TemplateUrl: "https://wpsuite-artifacts-*-*-*.s3.*.amazonaws.com/releases/*/templates/wpsuite-deployment-orchestrator-direct.yaml"
          PolicyName: "WriteDeploymentArtifacts"
      Tags:
        -
          Key: "aws-apn-id"
          Value: "pc:5d8wq5hg1d54kb933ntenntiu"
        -
          Key: "WPSuitePurpose"
          Value: "deployment-artifact-ingress"
  ArtifactStagerFunctionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                  - "logs:PutRetentionPolicy"
                Resource: "*"
          PolicyName: "ArtifactStagerLogs"
        -
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "s3:ListBucket"
                  - "s3:ListBucketVersions"
                  - "s3:ListBucketMultipartUploads"
                Resource:
                  Fn::Sub:
                    - "arn:${AWS::Partition}:s3:::${Bucket}"
                    -
                      Bucket:
                        Ref: "DeploymentArtifactBucket"
              -
                Effect: "Allow"
                Action:
                  - "s3:DeleteObject"
                  - "s3:DeleteObjectVersion"
                  - "s3:AbortMultipartUpload"
                Resource:
                  Fn::Sub:
                    - "arn:${AWS::Partition}:s3:::${Bucket}/*"
                    -
                      Bucket:
                        Ref: "DeploymentArtifactBucket"
          PolicyName: "CleanDeploymentArtifactBucket"
      Tags:
        -
          Key: "aws-apn-id"
          Value: "pc:5d8wq5hg1d54kb933ntenntiu"
  ArtifactStagerReadDeploymentSecretPolicy:
    Type: "AWS::IAM::Policy"
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Action:
              - "secretsmanager:GetSecretValue"
            Resource:
              Ref: "WpSuiteDeploymentSecretArn"
      PolicyName: "ReadDeploymentSecret"
      Roles:
        -
          Ref: "ArtifactStagerFunctionRole"
  ArtifactStagerFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      Code:
        ZipFile: "\nconst https = require(\"https\");\nconst url = require(\"url\");\nconst { SecretsManagerClient, GetSecretValueCommand } = require(\"@aws-sdk/client-secrets-manager\");\nconst { CloudWatchLogsClient, PutRetentionPolicyCommand } = require(\"@aws-sdk/client-cloudwatch-logs\");\nconst {\n  S3Client,\n  AbortMultipartUploadCommand,\n  DeleteObjectsCommand,\n  ListMultipartUploadsCommand,\n  ListObjectVersionsCommand,\n  ListObjectsV2Command\n} = require(\"@aws-sdk/client-s3\");\n\nconst logs = new CloudWatchLogsClient({});\nconst s3 = new S3Client({});\n\nfunction logInfo(message, data) {\n  console.info(JSON.stringify({ level: \"INFO\", message, data: data || {} }));\n}\n\nfunction logWarn(message, data) {\n  console.warn(JSON.stringify({ level: \"WARN\", message, data: data || {} }));\n}\n\nfunction logError(message, error, data) {\n  console.error(JSON.stringify({\n    level: \"ERROR\",\n    message,\n    data: data || {},\n    error: {\n      name: error && error.name,\n      message: error && error.message ? error.message : String(error),\n      stack: error && error.stack\n    }\n  }));\n}\n\nasync function configureLogRetention(retentionValue) {\n  const retentionInDays = Number(retentionValue || \"\");\n  if (!Number.isInteger(retentionInDays) || retentionInDays <= 0) {\n    if (retentionValue) {\n      logWarn(\"Skipping invalid ArtifactStager log retention value\", { retentionValue });\n    }\n    return;\n  }\n  const functionName = process.env.AWS_LAMBDA_FUNCTION_NAME;\n  if (!functionName) {\n    logWarn(\"Skipping ArtifactStager log retention because function name is unavailable\");\n    return;\n  }\n  const logGroupName = \"/aws/lambda/\" + functionName;\n  try {\n    await logs.send(new PutRetentionPolicyCommand({ logGroupName, retentionInDays }));\n    logInfo(\"ArtifactStager log retention configured\", { logGroupName, retentionInDays });\n  } catch (error) {\n    logWarn(\"ArtifactStager log retention could not be configured\", {\n      logGroupName,\n      retentionInDays,\n      errorName: error && error.name,\n      errorMessage: error && error.message ? error.message : String(error)\n    });\n  }\n}\n\nfunction requestJson(endpoint, body) {\n  return new Promise((resolve, reject) => {\n    const parsed = new url.URL(endpoint);\n    const payload = JSON.stringify(body);\n    const req = https.request({\n      hostname: parsed.hostname,\n      path: parsed.pathname + parsed.search,\n      method: \"POST\",\n      headers: {\n        \"content-type\": \"application/json\",\n        \"content-length\": Buffer.byteLength(payload)\n      }\n    }, (res) => {\n      let data = \"\";\n      res.on(\"data\", (chunk) => { data += chunk; });\n      res.on(\"end\", () => {\n        if (res.statusCode < 200 || res.statusCode >= 300) {\n          reject(new Error(\"WP Suite backend returned \" + res.statusCode));\n          return;\n        }\n        resolve(data ? JSON.parse(data) : {});\n      });\n    });\n    req.on(\"error\", reject);\n    req.write(payload);\n    req.end();\n  });\n}\n\nfunction sendResponse(event, context, status, data, physicalResourceId, reason) {\n  return new Promise((resolve, reject) => {\n    const body = JSON.stringify({\n      Status: status,\n      Reason: reason || (\"See CloudWatch Log Stream: \" + context.logStreamName),\n      PhysicalResourceId: physicalResourceId || context.logStreamName,\n      StackId: event.StackId,\n      RequestId: event.RequestId,\n      LogicalResourceId: event.LogicalResourceId,\n      NoEcho: false,\n      Data: data || {}\n    });\n    const parsed = new url.URL(event.ResponseURL);\n    const req = https.request({\n      hostname: parsed.hostname,\n      path: parsed.pathname + parsed.search,\n      method: \"PUT\",\n      headers: {\n        \"content-type\": \"\",\n        \"content-length\": Buffer.byteLength(body)\n      }\n    }, (res) => {\n      res.resume();\n      res.on(\"end\", resolve);\n    });\n    req.on(\"error\", reject);\n    req.write(body);\n    req.end();\n  });\n}\n\nasync function deploymentContext(props) {\n  if (props.DeploymentContextMode === \"direct\") {\n    if (!props.DeploymentId || !props.DeploymentNonce) {\n      throw new Error(\"Direct WP Suite deployment context is incomplete\");\n    }\n    return {\n      deploymentId: props.DeploymentId,\n      nonce: props.DeploymentNonce,\n      expectedAwsAccountId: props.ExpectedAwsAccountId || \"\"\n    };\n  }\n\n  if (!props.DeploymentSecretArn) {\n    throw new Error(\"WP Suite deployment secret ARN is missing\");\n  }\n\n  const secrets = new SecretsManagerClient({});\n  const secret = await secrets.send(new GetSecretValueCommand({\n    SecretId: props.DeploymentSecretArn\n  }));\n  if (!secret.SecretString) {\n    throw new Error(\"WP Suite deployment secret is empty\");\n  }\n\n  const parsed = JSON.parse(secret.SecretString);\n  if (!parsed.deploymentId || !parsed.nonce) {\n    throw new Error(\"WP Suite deployment secret is missing required fields\");\n  }\n  return parsed;\n}\n\nasync function deleteObjects(bucketName, objects) {\n  if (!objects.length) {\n    return 0;\n  }\n\n  let deleted = 0;\n  for (let index = 0; index < objects.length; index += 1000) {\n    const batch = objects.slice(index, index + 1000);\n    await s3.send(new DeleteObjectsCommand({\n      Bucket: bucketName,\n      Delete: {\n        Objects: batch,\n        Quiet: true\n      }\n    }));\n    deleted += batch.length;\n  }\n  return deleted;\n}\n\nasync function emptyBucket(bucketName) {\n  if (!bucketName) {\n    logWarn(\"Skipping artifact bucket cleanup because bucket name is missing\");\n    return;\n  }\n\n  try {\n    logInfo(\"ArtifactStager bucket cleanup started\", { bucketName });\n    let deletedObjects = 0;\n    let abortedUploads = 0;\n\n    let continuationToken;\n    do {\n      const response = await s3.send(new ListObjectsV2Command({\n        Bucket: bucketName,\n        ContinuationToken: continuationToken\n      }));\n      const objects = (response.Contents || [])\n        .filter((object) => object.Key)\n        .map((object) => ({ Key: object.Key }));\n      deletedObjects += await deleteObjects(bucketName, objects);\n      continuationToken = response.NextContinuationToken;\n    } while (continuationToken);\n\n    let keyMarker;\n    let versionIdMarker;\n    do {\n      const response = await s3.send(new ListObjectVersionsCommand({\n        Bucket: bucketName,\n        KeyMarker: keyMarker,\n        VersionIdMarker: versionIdMarker\n      }));\n      const versions = [\n        ...(response.Versions || []),\n        ...(response.DeleteMarkers || [])\n      ]\n        .filter((object) => object.Key)\n        .map((object) => ({ Key: object.Key, VersionId: object.VersionId }));\n      deletedObjects += await deleteObjects(bucketName, versions);\n      keyMarker = response.NextKeyMarker;\n      versionIdMarker = response.NextVersionIdMarker;\n    } while (keyMarker);\n\n    let uploadKeyMarker;\n    let uploadIdMarker;\n    do {\n      const response = await s3.send(new ListMultipartUploadsCommand({\n        Bucket: bucketName,\n        KeyMarker: uploadKeyMarker,\n        UploadIdMarker: uploadIdMarker\n      }));\n      for (const upload of response.Uploads || []) {\n        if (!upload.Key || !upload.UploadId) {\n          continue;\n        }\n        await s3.send(new AbortMultipartUploadCommand({\n          Bucket: bucketName,\n          Key: upload.Key,\n          UploadId: upload.UploadId\n        }));\n        abortedUploads += 1;\n      }\n      uploadKeyMarker = response.NextKeyMarker;\n      uploadIdMarker = response.NextUploadIdMarker;\n    } while (uploadKeyMarker);\n\n    logInfo(\"ArtifactStager bucket cleanup completed\", {\n      bucketName,\n      deletedObjects,\n      abortedUploads\n    });\n  } catch (error) {\n    if (error && error.name === \"NoSuchBucket\") {\n      logWarn(\"ArtifactStager bucket cleanup skipped because bucket no longer exists\", { bucketName });\n      return;\n    }\n    throw error;\n  }\n}\n\nexports.handler = async (event, context) => {\n  const physicalResourceId = event.PhysicalResourceId || \"wpsuite-artifact-stager\";\n  const props = event.ResourceProperties || {};\n  logInfo(\"ArtifactStager request received\", {\n    requestType: event.RequestType,\n    logicalResourceId: event.LogicalResourceId,\n    physicalResourceId,\n    stackId: event.StackId,\n    hasDeploymentSecretArn: Boolean(props.DeploymentSecretArn),\n    deploymentContextMode: props.DeploymentContextMode,\n    targetBucketName: props.TargetBucketName,\n    targetPrefix: props.TargetPrefix\n  });\n  try {\n    await configureLogRetention(props.LogRetentionDays);\n\n    if (event.RequestType === \"Delete\") {\n      await emptyBucket(props.TargetBucketName);\n      logInfo(\"ArtifactStager delete request acknowledged\", { physicalResourceId });\n      await sendResponse(event, context, \"SUCCESS\", {}, physicalResourceId);\n      return;\n    }\n\n    const deployment = await deploymentContext(props);\n    logInfo(\"ArtifactStager deployment context resolved\", {\n      deploymentId: deployment.deploymentId,\n      expectedAwsAccountId: deployment.expectedAwsAccountId || \"\",\n      templateVersion: deployment.templateVersion || props.TemplateVersion,\n      hasTopology: Boolean(deployment.topology || props.Topology)\n    });\n    const currentAwsAccountId = context.invokedFunctionArn.split(\":\")[4];\n    const templateVersion = deployment.templateVersion || props.TemplateVersion;\n    const topology = deployment.topology || props.Topology || {};\n    logInfo(\"ArtifactStager calling WP Suite backend\", {\n      endpoint: props.BackendStageArtifactUrl,\n      deploymentId: deployment.deploymentId,\n      templateVersion,\n      targetBucketName: props.TargetBucketName,\n      targetPrefix: props.TargetPrefix\n    });\n    const response = await requestJson(props.BackendStageArtifactUrl, {\n      requestType: event.RequestType,\n      stackId: event.StackId,\n      requestId: event.RequestId,\n      deploymentId: deployment.deploymentId,\n      nonce: deployment.nonce,\n      awsAccountId: deployment.expectedAwsAccountId || currentAwsAccountId,\n      templateVersion,\n      topology,\n      stagingBucket: props.TargetBucketName,\n      stagingPrefix: props.TargetPrefix,\n      targetBucketName: props.TargetBucketName,\n      targetPrefix: props.TargetPrefix,\n      artifactIngressRoleArn: props.ArtifactIngressRoleArn,\n      artifactIngressExternalId: props.ArtifactIngressExternalId,\n      region: process.env.AWS_REGION\n    });\n    logInfo(\"ArtifactStager backend call completed\", {\n      deploymentId: deployment.deploymentId,\n      artifactRootPrefix: response.artifactRootPrefix || props.TargetPrefix,\n      templateVersion: response.templateVersion || templateVersion\n    });\n\n    await sendResponse(event, context, \"SUCCESS\", {\n      ArtifactRootPrefix: response.artifactRootPrefix || props.TargetPrefix,\n      TemplateVersion: response.templateVersion || templateVersion\n    }, physicalResourceId);\n  } catch (error) {\n    logError(\"ArtifactStager request failed\", error, {\n      requestType: event.RequestType,\n      logicalResourceId: event.LogicalResourceId,\n      physicalResourceId\n    });\n    await sendResponse(event, context, \"FAILED\", {}, physicalResourceId, error && error.message ? error.message : String(error));\n  }\n};\n"
      Environment:
        Variables:
          WPSUITE_MARKETPLACE_DEPLOYMENT_PRODUCT_CODE: "5d8wq5hg1d54kb933ntenntiu"
          AWS_SDK_UA_APP_ID: "APN_1.1/pc_5d8wq5hg1d54kb933ntenntiu$"
      FunctionName:
        Fn::Sub: "${AWS::StackName}-artifact-stager"
      Handler: "index.handler"
      MemorySize: 256
      Role:
        Fn::GetAtt:
          - "ArtifactStagerFunctionRole"
          - "Arn"
      Runtime: "nodejs24.x"
      Tags:
        -
          Key: "aws-apn-id"
          Value: "pc:5d8wq5hg1d54kb933ntenntiu"
      Timeout: 900
  ArtifactStager:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "ArtifactStagerFunction"
          - "Arn"
      BackendStageArtifactUrl: "https://api.wpsuite.io/marketplace/deployment/stage-artifact"
      DeploymentContextMode: "marketplace_secret"
      DeploymentSecretArn:
        Ref: "WpSuiteDeploymentSecretArn"
      DeploymentId: ""
      DeploymentNonce: ""
      ExpectedAwsAccountId: ""
      TemplateVersion: "v1.0.30"
      MarketplaceTemplateSource:
        BucketName:
          Ref: "MPS3BucketName"
        BucketRegion:
          Ref: "MPS3BucketRegion"
        KeyPrefix:
          Ref: "MPS3KeyPrefix"
      TargetBucketName:
        Ref: "DeploymentArtifactBucket"
      TargetPrefix:
        Fn::Join:
          - ""
          -
            -
              Fn::Sub: "wpsuite-artifacts/${AWS::StackId}/"
            - "v1.0.30/"
      ArtifactIngressRoleArn:
        Fn::GetAtt:
          - "ArtifactIngressRole"
          - "Arn"
      ArtifactIngressExternalId:
        Ref: "AWS::StackId"
      LogRetentionDays: "14"
      Topology:
        DeployCognito: "false"
        DeployAiKitBackend: "false"
        DeployFlowBackend: "false"
        DeployStaticGuardian: "false"
        IdentityMode: "none"
  CognitoNestedStack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      Parameters:
        MPS3BucketName:
          Ref: "MPS3BucketName"
        MPS3BucketRegion:
          Ref: "MPS3BucketRegion"
        MPS3KeyPrefix:
          Ref: "MPS3KeyPrefix"
        DeploymentContextMode: "marketplace_secret"
        WpSuiteDeploymentSecretArn:
          Ref: "WpSuiteDeploymentSecretArn"
        TemplateVersion:
          Fn::GetAtt:
            - "ArtifactStager"
            - "TemplateVersion"
        ArtifactBucketName:
          Ref: "DeploymentArtifactBucket"
        ArtifactRootPrefix:
          Fn::GetAtt:
            - "ArtifactStager"
            - "ArtifactRootPrefix"
        LogRetentionDays: "14"
        Enabled: "false"
        AppName:
          Fn::Sub: "${AWS::StackName}"
        Environment: "prod"
        ExistingUserPoolId: ""
        ExistingUserPoolClientId: ""
        ExistingIdentityPoolId: ""
        PostLoginRedirectUrl: "https://example.com/signin"
        RegisteredGroupName: "registered"
        AdminGroupName: "admin"
        CreateIdentityPool: "true"
        EnableCustomEmailSender: "false"
        EnableRecaptcha: "false"
        RecaptchaMode: "enterprise"
        RecaptchaProjectId: ""
        RecaptchaSiteKey: ""
        RecaptchaSecretKey: ""
        RecaptchaScoreThreshold: "0.5"
        UserPoolName: ""
        LoginMechanisms: ""
        OAuthScopes: ""
        RequireEmailAttribute: ""
        RequireGivenNameAttribute: ""
        RequireFamilyNameAttribute: ""
        RequirePhoneNumberAttribute: ""
        EnablePreSignUp: ""
        EnablePreTokenGeneration: ""
        EnablePostConfirmation: ""
        MfaMode: ""
        DeviceTrackingMode: ""
        VerifyAttributeChanges: ""
        VerifyAttributeChangesMode: ""
        EnableSoftwareTokenMfa: ""
        EnableEmailOtpMfa: ""
        EnableSmsMfa: ""
        CreateCustomDomain: ""
        RegisterRoute53Alias: ""
        UserPoolCustomDomainSubdomain: ""
        UserPoolCustomDomainCertArn: ""
        AutoCreateSesIdentity: ""
        DeleteSesIdentityOnStackDelete: ""
        EmailTemplateBucketName: ""
        SesIdentity: ""
        EmailFromAddress: ""
        CallbackBaseUrl: ""
        KmsKeyId: ""
      Tags:
        -
          Key: "aws-apn-id"
          Value: "pc:5d8wq5hg1d54kb933ntenntiu"
      TemplateURL:
        Fn::Sub:
          - "https://${Bucket}.s3.${Region}.${AWS::URLSuffix}/${Prefix}/${TemplatePath}"
          -
            Bucket:
              Ref: "MPS3BucketName"
            Region:
              Ref: "MPS3BucketRegion"
            Prefix:
              Ref: "MPS3KeyPrefix"
            TemplatePath: "wpsuite-cognito-wrapper.yaml"
    DependsOn:
      - "ArtifactStager"
  FlowBackendNestedStack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      Parameters:
        MPS3BucketName:
          Ref: "MPS3BucketName"
        MPS3BucketRegion:
          Ref: "MPS3BucketRegion"
        MPS3KeyPrefix:
          Ref: "MPS3KeyPrefix"
        DeploymentContextMode: "marketplace_secret"
        WpSuiteDeploymentSecretArn:
          Ref: "WpSuiteDeploymentSecretArn"
        TemplateVersion:
          Fn::GetAtt:
            - "ArtifactStager"
