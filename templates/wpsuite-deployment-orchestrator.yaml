  AiKitBackendNestedStack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      Parameters:
        MPS3BucketName:
          Ref: "MPS3BucketName"
        MPS3BucketRegion:
          Ref: "MPS3BucketRegion"
        MPS3KeyPrefix:
