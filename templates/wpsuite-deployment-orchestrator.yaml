      Tags:
        -
          Key: "aws-apn-id"
          Value: "pc:5d8wq5hg1d54kb933ntenntiu"
      TemplateURL:
        Fn::Sub:
          - "https://${Bucket}.s3.${Region}.${AWS::URLSuffix}/${Prefix}/${TemplatePath}"
          -
            Bucket:
              Ref: "MPS3BucketName"
            Region:
              Ref: "MPS3BucketRegion"
            Prefix:
              Ref: "MPS3KeyPrefix"
            TemplatePath: "wpsuite-flow-backend-wrapper.yaml"
    DependsOn:
