            -
              Ref: "Enabled"
        AppName:
          Fn::Sub:
            - "${AppName}-${Environment}-${AppNameSuffix}"
            -
              AppName:
                Ref: "AppName"
              Environment:
                Fn::If:
                  - "CondUseMarketplaceSecret"
                  -
                    Fn::Sub:
                      - "{{resolve:secretsmanager:${DeploymentSecretArn}:SecretString:AiKitEnvironment}}"
                      -
                        DeploymentSecretArn:
