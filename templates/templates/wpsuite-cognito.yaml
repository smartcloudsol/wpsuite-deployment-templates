  CustomEmailSenderFunctionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyName: "CustomEmailSenderFunctionRolePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource:
                  Fn::Sub:
                    - "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupNamePattern}"
                    -
                      LogGroupNamePattern:
                        Fn::Sub: "/aws/lambda/${AppName}-custom-email-sender*"
              -
                Effect: "Allow"
                Action:
                  - "s3:GetObject"
                Resource:
                  -
                    Fn::If:
                      - "CondCreateEmailTemplateBucket"
                      -
                        Fn::Sub: "${EmailTemplateBucket.Arn}/*"
                      -
                        Fn::Sub: "arn:${AWS::Partition}:s3:::${EmailTemplateBucketName}/*"
              -
                Fn::If:
                  - "CondUseSES"
                  -
                    Effect: "Allow"
                    Action:
                      - "ses:SendEmail"
                      - "ses:SendRawEmail"
                    Resource: "*"
                  -
                    Ref: "AWS::NoValue"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "CustomEmailSenderFunctionRoleTemplateEnabledCondition"
  CustomEmailSenderFunctionLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName:
        Fn::Sub: "/aws/lambda/${AppName}-custom-email-sender"
      RetentionInDays:
        Ref: "LogRetentionDays"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "CustomEmailSenderFunctionLogGroupTemplateEnabledCondition"
  CustomEmailSenderFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName:
        Fn::Sub: "${AppName}-custom-email-sender"
      Code:
        S3Bucket:
          Ref: "ArtifactBucketName"
        S3Key:
          Fn::Join:
            - ""
            -
              -
                Ref: "ArtifactRootPrefix"
              - "wpsuite-cognito/functions/custom-email-sender.zip"
      Handler: "index.handler"
      Runtime: "nodejs24.x"
      Timeout: 30
      MemorySize: 256
      Architectures:
        - "x86_64"
      Role:
        Fn::GetAtt:
          - "CustomEmailSenderFunctionRole"
          - "Arn"
      Layers:
        -
          Ref: "CognitoCommonLayer"
      Environment:
        Variables:
          AWS_PARTITION:
            Ref: "AWS::Partition"
          AWS_ACCOUNT_ID:
            Ref: "AWS::AccountId"
          WPSUITE_MARKETPLACE_DEPLOYMENT_PRODUCT_CODE: "5d8wq5hg1d54kb933ntenntiu"
          AWS_SDK_UA_APP_ID: "APN_1.1/pc_5d8wq5hg1d54kb933ntenntiu$"
          TEMPLATE_BUCKET:
            Fn::If:
              - "CondCreateEmailTemplateBucket"
              -
                Ref: "EmailTemplateBucket"
              -
                Ref: "EmailTemplateBucketName"
          TEMPLATE_PREFIX: "email-templates/"
          SES_IDENTITY:
            Fn::If:
              - "CondAutoCreateSesIdentity"
              -
                Fn::GetAtt:
                  - "SesIdentityManager"
                  - "Identity"
              -
                Ref: "SesIdentity"
          FROM_ADDRESS:
            Ref: "EmailFromAddress"
          CALLBACK_BASE_URL:
            Ref: "CallbackBaseUrl"
          SUBJECT_SIGNUP:
            Ref: "SubjectTemplateSignUp"
          SUBJECT_RESEND_CODE:
            Ref: "SubjectTemplateResendCode"
          SUBJECT_FORGOT_PASSWORD:
            Ref: "SubjectTemplateAccountRecovery"
          SUBJECT_ADMIN_CREATE:
            Ref: "SubjectTemplateAdminCreate"
          SUBJECT_VERIFY_ATTRIBUTE:
            Ref: "SubjectTemplateVerifyAttribute"
          SUBJECT_AUTHENTICATION:
            Ref: "SubjectTemplateAuthentication"
          SUBJECT_ACCOUNT_TAKEOVER:
            Ref: "SubjectTemplateAccountTakeover"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "CustomEmailSenderFunctionTemplateEnabledCondition"
  UserPoolSettingsManager:
    Type: "Custom::ApplyUserPoolSettings"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CustomResourceFunction"
          - "Arn"
      Action: "ApplyUserPoolSettings"
      UserPoolId:
        Fn::If:
          - "CondCreateUserPool"
