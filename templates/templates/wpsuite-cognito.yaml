Outputs:
  PrmProductCode:
    Description: "AWS Marketplace product code used for WP Suite Deployment Access PRM attribution."
    Value:
      Fn::FindInMap:
        - "WpSuiteMarketplace"
        - "DeploymentAccess"
        - "ProductCode"
  TemplateVersion:
    Description: "Template version used for this nested stack."
    Value:
      Ref: "TemplateVersion"
  UserPoolId:
    Description: "Cognito User Pool ID."
    Value:
      Fn::If:
        - "CondCreateUserPool"
        -
          Ref: "UserPool"
        -
          Ref: "ExistingUserPoolId"
  UserPoolArn:
    Description: "Cognito User Pool ARN."
    Value:
      Fn::If:
        - "CondCreateUserPool"
        -
          Fn::GetAtt:
            - "UserPool"
