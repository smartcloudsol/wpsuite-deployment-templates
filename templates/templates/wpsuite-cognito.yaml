AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Cognito nested template for Marketplace Deployment Access"
Parameters:
  PrmTagValue:
    Type: "String"
    Default: "pc:5d8wq5hg1d54kb933ntenntiu"
    AllowedPattern: "^pc:[a-z0-9]+$"
    Description: "AWS Partner Revenue Measurement tag value for WP Suite Deployment Access resources."
  Enabled:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create Cognito resources in this nested stack. When false, only existing identity outputs are exposed."
  TemplateVersion:
    Type: "String"
    Default: "v1.0.30"
    Description: "Immutable WP Suite deployment template version."
  ArtifactRootPrefix:
    Type: "String"
    Description: "Buyer-owned S3 prefix containing staged artifacts."
  ArtifactBucketName:
    Type: "String"
    Description: "S3 bucket that stores staged artifacts for this application."
  AppName:
    Type: "String"
    Default: "wpsuite-cognito"
    AllowedPattern: "^[a-zA-Z0-9-]+$"
    Description: "Short application name used as the prefix for generated AWS resource names."
  LogRetentionDays:
    Type: "Number"
    Default: "14"
    AllowedValues:
      - "1"
      - "3"
      - "5"
      - "7"
      - "14"
      - "30"
      - "60"
      - "90"
      - "120"
      - "150"
      - "180"
      - "365"
      - "400"
      - "545"
      - "731"
      - "1827"
      - "3653"
    Description: "Number of days to retain CloudWatch logs for Lambda functions."
  CreateUserPool:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create a new Cognito user pool. Set false to attach triggers and settings to an existing user pool instead."
  CreateIdentityPool:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create a Cognito identity pool for authenticated identities."
  CreateCustomDomain:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create a Cognito custom domain for the user pool."
  RegisterRoute53Alias:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create a Route 53 alias record for the Cognito custom domain."
  AllowUnauthenticatedIdentities:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Allow unauthenticated identities in the identity pool."
  EnableCustomEmailSender:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable the custom email sender Lambda and HTML email templates."
  AutoCreateSesIdentity:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Automatically ensure an SES identity exists for the configured sender domain or email identity."
  DeleteSesIdentityOnStackDelete:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Delete the SES identity on stack deletion."
  EnablePreSignUp:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable the pre sign-up Lambda trigger."
  EnablePreTokenGeneration:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable the pre token generation Lambda trigger."
  EnablePostConfirmation:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable the post confirmation Lambda trigger."
  EnableRecaptcha:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable reCAPTCHA verification in the pre sign-up trigger."
  RequireEmailAttribute:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Mark the email attribute as required at sign-up."
  RequireGivenNameAttribute:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Mark the given_name attribute as required at sign-up."
  RequireFamilyNameAttribute:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Mark the family_name attribute as required at sign-up."
  RequirePhoneNumberAttribute:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Mark the phone_number attribute as required at sign-up."
  EnableSoftwareTokenMfa:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable authenticator app MFA."
  EnableEmailOtpMfa:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable email OTP MFA."
  EnableSmsMfa:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable SMS MFA."
  VerifyAttributeChanges:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Keep original email or phone values active while the new value is pending verification."
  ExistingUserPoolId:
    Type: "String"
    Default: ""
    Description: "Existing Cognito user pool ID to reuse when CreateUserPool is false."
  ExistingUserPoolClientId:
    Type: "String"
    Default: ""
    Description: "Existing Cognito user pool app client ID to expose when CreateUserPool is false."
  ExistingIdentityPoolId:
    Type: "String"
    Default: ""
    Description: "Existing Cognito identity pool ID to expose when CreateIdentityPool is false."
  ExistingAuthenticatedRoleArn:
    Type: "String"
    Default: ""
    Description: "Existing authenticated Cognito identity role ARN to expose when CreateIdentityPool is false."
  ExistingRegisteredRoleArn:
    Type: "String"
    Default: ""
    Description: "Existing registered Cognito identity role ARN to expose when CreateIdentityPool is false."
  PostLoginRedirectUrl:
    Type: "String"
    Default: "https://example.com/signin"
    Description: "OAuth callback URL used by the default user pool app client."
  UserPoolName:
    Type: "String"
    Default: ""
    Description: "Optional explicit user pool name. Leave empty to use a generated name."
  UserPoolCustomDomainSubdomain:
    Type: "String"
    Default: ""
    Description: "Full custom domain name for Cognito, for example auth.example.com."
  UserPoolCustomDomainCertArn:
    Type: "String"
    Default: ""
    Description: "ACM certificate ARN for the Cognito custom domain."
  IdentityPoolName:
    Type: "String"
    Default: ""
    Description: "Optional explicit identity pool name. Leave empty to use a generated name."
  EmailTemplateBucketName:
    Type: "String"
    Default: ""
    Description: "Existing S3 bucket for HTML email templates. Leave empty to create a dedicated bucket."
  SesIdentity:
    Type: "String"
    Default: ""
    Description: "SES verified identity used by custom email sender or email OTP MFA."
  EmailFromAddress:
    Type: "String"
    Default: ""
    Description: "Optional From address used when SES sends custom emails."
  CallbackBaseUrl:
    Type: "String"
    Default: ""
    Description: "Optional base URL inserted into custom email templates for links and redirects."
  KmsKeyId:
    Type: "String"
    Default: ""
    Description: "KMS key ID or ARN used by Cognito for the custom email sender trigger."
  SubjectTemplateSignUp:
    Type: "String"
    Default: "Confirm your account"
    Description: "Subject line for the sign-up confirmation email."
  SubjectTemplateResendCode:
    Type: "String"
    Default: "Your confirmation code"
    Description: "Subject line for the resend confirmation code email."
  SubjectTemplateAccountRecovery:
    Type: "String"
    Default: "Reset your password"
    Description: "Subject line for the account recovery email."
  SubjectTemplateAdminCreate:
    Type: "String"
    Default: "Your account has been created"
    Description: "Subject line for the admin create user email."
  SubjectTemplateVerifyAttribute:
    Type: "String"
    Default: "Verify your information"
    Description: "Subject line for the verify attribute email."
  SubjectTemplateAuthentication:
    Type: "String"
    Default: "Your authentication code"
    Description: "Subject line for the authentication code email."
  SubjectTemplateAccountTakeover:
    Type: "String"
    Default: "Security alert"
    Description: "Subject line for the account takeover alert email."
  RecaptchaProjectId:
    Type: "String"
    Default: ""
    Description: "Google Cloud project ID for reCAPTCHA Enterprise."
  RecaptchaSiteKey:
    Type: "String"
    Default: ""
    Description: "Public reCAPTCHA site key expected from the client."
  RegisteredGroupName:
    Type: "String"
    Default: "registered"
    Description: "Default Cognito group name assigned to confirmed users."
  AdminGroupName:
    Type: "String"
    Default: "admin"
    Description: "Cognito group name for administrator users."
  SmsConfigurationSnsCallerArn:
    Type: "String"
    Default: ""
    Description: "IAM role ARN that Cognito uses to send SMS through SNS when SMS MFA is enabled."
  SmsConfigurationExternalId:
    Type: "String"
    Default: ""
    Description: "Optional external ID for the SNS caller role."
  SmsConfigurationSnsRegion:
    Type: "String"
    Default: ""
    Description: "Optional SNS region for Cognito SMS sending."
  OAuthScopes:
    Type: "CommaDelimitedList"
    Default: "aws.cognito.signin.user.admin,email,openid,profile"
    Description: "OAuth scopes enabled for the default user pool app client."
  LoginMechanisms:
    Type: "CommaDelimitedList"
    Default: "email"
    Description: "Sign-in attributes allowed by the user pool."
  RecaptchaSecretKey:
    Type: "String"
    Default: ""
    Description: "Secret reCAPTCHA key stored in SSM Parameter Store when provided."
    NoEcho: true
  RecaptchaMode:
    Type: "String"
    Default: "enterprise"
    AllowedValues:
      - "enterprise"
      - "classic"
    Description: "reCAPTCHA mode used by the pre sign-up trigger."
  RecaptchaScoreThreshold:
    Type: "Number"
    Default: 0.5
    Description: "Minimum accepted reCAPTCHA score."
  MfaMode:
    Type: "String"
    Default: "no"
    AllowedValues:
      - "no"
      - "optional"
      - "required"
    Description: "Multi-factor authentication mode for the user pool."
  DeviceTrackingMode:
    Type: "String"
    Default: "none"
    AllowedValues:
      - "none"
      - "user_opt_in"
      - "always"
    Description: "Device remembering mode. Only effective when MFA is not set to no."
  VerifyAttributeChangesMode:
    Type: "String"
    Default: "auto"
    AllowedValues:
      - "auto"
      - "email"
      - "phone_number"
      - "email_and_phone"
    Description: "Which attributes must be verified before update."
Mappings:
  WpSuiteMarketplace:
    DeploymentAccess:
      ProductCode: "5d8wq5hg1d54kb933ntenntiu"
Conditions:
  TemplateEnabled:
    Fn::Equals:
      -
        Ref: "Enabled"
      - "true"
  CondCreateUserPool:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Fn::Equals:
          -
            Ref: "CreateUserPool"
          - "true"
  CondUseExistingUserPool:
    Fn::And:
      -
        Fn::Not:
          -
            Condition: "CondCreateUserPool"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Ref: "ExistingUserPoolId"
              - ""
  CondCreateIdentityPool:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Fn::Equals:
          -
            Ref: "CreateIdentityPool"
          - "true"
  CondCreateIdentityPoolWithNewUserPool:
    Fn::And:
      -
        Condition: "CondCreateIdentityPool"
      -
        Condition: "CondCreateUserPool"
  CondCreateDomain:
    Fn::And:
      -
        Fn::Equals:
          -
            Ref: "CreateCustomDomain"
          - "true"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Ref: "UserPoolCustomDomainSubdomain"
              - ""
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Ref: "UserPoolCustomDomainCertArn"
              - ""
  CondRegisterAlias:
    Fn::And:
      -
        Condition: "CondCreateDomain"
      -
        Fn::Equals:
          -
            Ref: "RegisterRoute53Alias"
          - "true"
  CondEnableEmailSender:
    Fn::Equals:
      -
        Ref: "EnableCustomEmailSender"
      - "true"
  CondEnablePreSignUp:
    Fn::Equals:
      -
        Ref: "EnablePreSignUp"
      - "true"
  CondEnablePreTokenGeneration:
    Fn::Equals:
      -
        Ref: "EnablePreTokenGeneration"
      - "true"
  CondEnablePostConfirmation:
    Fn::Equals:
      -
        Ref: "EnablePostConfirmation"
      - "true"
  CondCreateEmailTemplateBucket:
    Fn::And:
      -
        Condition: "CondEnableEmailSender"
      -
        Fn::Equals:
          -
            Ref: "EmailTemplateBucketName"
          - ""
  CondHasSesIdentityInput:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "SesIdentity"
          - ""
  CondAutoCreateSesIdentity:
    Fn::And:
      -
        Condition: "CondEnableEmailSender"
      -
        Fn::Equals:
          -
            Ref: "AutoCreateSesIdentity"
          - "true"
      -
        Fn::Or:
          -
            Condition: "CondHasSesIdentityInput"
          -
            Condition: "CondCreateDomain"
  CondUseSES:
    Fn::Or:
      -
        Condition: "CondHasSesIdentityInput"
      -
        Condition: "CondAutoCreateSesIdentity"
  CondAttachCustomEmailSender:
    Fn::And:
      -
        Condition: "CondEnableEmailSender"
      -
        Condition: "CondUseSES"
  CondAllowUnauthenticatedIdentities:
    Fn::Equals:
      -
        Ref: "AllowUnauthenticatedIdentities"
      - "true"
  HasSingleEmailLogin:
    Fn::Equals:
      -
        Fn::Join:
          - ","
          -
            Ref: "LoginMechanisms"
      - "email"
  HasSinglePhoneLogin:
    Fn::Equals:
      -
        Fn::Join:
          - ","
          -
            Ref: "LoginMechanisms"
      - "phone_number"
  HasMultipleLoginMechanisms:
    Fn::Not:
      -
        Fn::Or:
          -
            Condition: "HasSingleEmailLogin"
          -
            Condition: "HasSinglePhoneLogin"
          -
            Fn::Equals:
              -
                Fn::Join:
                  - ","
                  -
                    Ref: "LoginMechanisms"
              - "username"
  HasCustomUserPoolName:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "UserPoolName"
          - ""
  HasCustomIdentityPoolName:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "IdentityPoolName"
          - ""
  CondRequireEmailAttribute:
    Fn::Equals:
      -
        Ref: "RequireEmailAttribute"
      - "true"
  CondRequireGivenNameAttribute:
    Fn::Equals:
      -
        Ref: "RequireGivenNameAttribute"
      - "true"
  CondRequireFamilyNameAttribute:
    Fn::Equals:
      -
        Ref: "RequireFamilyNameAttribute"
      - "true"
  CondRequirePhoneNumberAttribute:
    Fn::Equals:
      -
        Ref: "RequirePhoneNumberAttribute"
      - "true"
  HasProvidedKmsKeyId:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "KmsKeyId"
          - ""
  CondCreateCustomSenderKmsKey:
    Fn::And:
      -
        Condition: "CondAttachCustomEmailSender"
      -
        Fn::Not:
          -
            Condition: "HasProvidedKmsKeyId"
  CustomSenderKmsKeyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateCustomSenderKmsKey"
  CustomSenderKmsAliasTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateCustomSenderKmsKey"
  UserPoolTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateUserPool"
  RegisteredRoleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateIdentityPoolWithNewUserPool"
  RegisteredGroupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateUserPool"
  AdminGroupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateUserPool"
  UserPoolClientTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateUserPool"
  UserPoolDomainTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateDomain"
  IdentityPoolTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateIdentityPoolWithNewUserPool"
  AuthenticatedRoleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateIdentityPoolWithNewUserPool"
  IdentityPoolRoleAttachmentTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateIdentityPoolWithNewUserPool"
  EmailTemplateBucketTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateEmailTemplateBucket"
  CondEnableRecaptchaWithSecret:
    Fn::And:
      -
        Fn::Equals:
          -
            Ref: "EnableRecaptcha"
          - "true"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Ref: "RecaptchaSecretKey"
              - ""
  RecaptchaSecretParameterTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnableRecaptchaWithSecret"
  EmailTemplateBucketCleanerTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateEmailTemplateBucket"
  TemplateUploadTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnableEmailSender"
  HostedZoneLookupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondRegisterAlias"
  Route53AliasRecordTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondRegisterAlias"
  SesIdentityManagerTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondAutoCreateSesIdentity"
  PreSignUpFunctionRoleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreSignUp"
  PreSignUpFunctionLogGroupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreSignUp"
  PreSignUpFunctionTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreSignUp"
  PreTokenGenerationFunctionRoleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreTokenGeneration"
  PreTokenGenerationFunctionLogGroupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreTokenGeneration"
  PreTokenGenerationFunctionTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreTokenGeneration"
  PostConfirmationFunctionRoleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePostConfirmation"
  PostConfirmationFunctionLogGroupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePostConfirmation"
  PostConfirmationFunctionTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePostConfirmation"
  CustomEmailSenderFunctionRoleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnableEmailSender"
  CustomEmailSenderFunctionLogGroupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnableEmailSender"
  CustomEmailSenderFunctionTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnableEmailSender"
  TriggerAttachToExistingPoolTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondUseExistingUserPool"
  PermissionForPreSignUpTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreSignUp"
  PermissionForPreTokenGenerationTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreTokenGeneration"
  PermissionForPostConfirmationTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePostConfirmation"
  PermissionForCustomEmailSenderTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondAttachCustomEmailSender"
  OutputUserPoolDomainTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondCreateDomain"
  OutputUserPoolDomainAliasTargetTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondRegisterAlias"
  OutputEmailTemplateBucketNameTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnableEmailSender"
  OutputSesIdentityValueTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondUseSES"
  OutputPreSignUpFunctionArnTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreSignUp"
  OutputPreTokenGenerationFunctionArnTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePreTokenGeneration"
  OutputPostConfirmationFunctionArnTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnablePostConfirmation"
  OutputCustomEmailSenderFunctionArnTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CondEnableEmailSender"
Resources:
  CustomSenderKmsKey:
    Type: "AWS::KMS::Key"
    Properties:
      Description:
        Fn::Sub: "KMS key for Cognito custom email sender in ${AppName}"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          -
            Sid: "AllowAccountAdmin"
            Effect: "Allow"
            Principal:
              AWS:
                Fn::Sub: "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action:
              - "kms:CancelKeyDeletion"
              - "kms:CreateAlias"
              - "kms:CreateGrant"
              - "kms:Decrypt"
              - "kms:DeleteAlias"
              - "kms:DescribeKey"
              - "kms:DisableKey"
              - "kms:DisableKeyRotation"
              - "kms:EnableKey"
              - "kms:EnableKeyRotation"
              - "kms:Encrypt"
              - "kms:GenerateDataKey"
              - "kms:GenerateDataKeyPair"
              - "kms:GenerateDataKeyPairWithoutPlaintext"
              - "kms:GenerateDataKeyWithoutPlaintext"
              - "kms:GetKeyPolicy"
              - "kms:GetKeyRotationStatus"
              - "kms:GetPublicKey"
              - "kms:ListGrants"
              - "kms:ListResourceTags"
              - "kms:PutKeyPolicy"
              - "kms:ReEncryptFrom"
              - "kms:ReEncryptTo"
              - "kms:RetireGrant"
              - "kms:RevokeGrant"
              - "kms:ScheduleKeyDeletion"
              - "kms:Sign"
              - "kms:TagResource"
              - "kms:UntagResource"
              - "kms:UpdateAlias"
              - "kms:UpdateKeyDescription"
              - "kms:Verify"
            Resource: "*"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "CustomSenderKmsKeyTemplateEnabledCondition"
  CustomSenderKmsAlias:
    Type: "AWS::KMS::Alias"
    Properties:
      AliasName:
        Fn::Sub: "alias/${AppName}-cognito-custom-sender"
      TargetKeyId:
        Ref: "CustomSenderKmsKey"
    Condition: "CustomSenderKmsAliasTemplateEnabledCondition"
  UserPool:
    Type: "AWS::Cognito::UserPool"
    Properties:
      UserPoolName:
        Fn::If:
          - "HasCustomUserPoolName"
          -
            Ref: "UserPoolName"
          -
            Fn::Sub: "${AppName}-user-pool"
      UsernameAttributes:
        Fn::If:
          - "HasSingleEmailLogin"
          -
            - "email"
          -
            Fn::If:
              - "HasSinglePhoneLogin"
              -
                - "phone_number"
              -
                Ref: "AWS::NoValue"
      AliasAttributes:
        Fn::If:
          - "HasMultipleLoginMechanisms"
          -
