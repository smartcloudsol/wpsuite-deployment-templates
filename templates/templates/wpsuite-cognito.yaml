      Fn::If:
        - "CondAutoCreateSesIdentity"
        -
          Fn::GetAtt:
            - "SesIdentityManager"
            - "Identity"
        -
          Ref: "SesIdentity"
    Condition: "OutputSesIdentityValueTemplateEnabledCondition"
  PreSignUpFunctionArn:
    Description: "Pre sign-up Lambda ARN."
    Value:
      Fn::GetAtt:
        - "PreSignUpFunction"
        - "Arn"
    Condition: "OutputPreSignUpFunctionArnTemplateEnabledCondition"
  PreTokenGenerationFunctionArn:
    Description: "Pre token generation Lambda ARN."
    Value:
      Fn::GetAtt:
        - "PreTokenGenerationFunction"
        - "Arn"
    Condition: "OutputPreTokenGenerationFunctionArnTemplateEnabledCondition"
  PostConfirmationFunctionArn:
    Description: "Post confirmation Lambda ARN."
    Value:
      Fn::GetAtt:
        - "PostConfirmationFunction"
        - "Arn"
    Condition: "OutputPostConfirmationFunctionArnTemplateEnabledCondition"
  CustomEmailSenderFunctionArn:
    Description: "Custom email sender Lambda ARN."
    Value:
      Fn::GetAtt:
        - "CustomEmailSenderFunction"
        - "Arn"
