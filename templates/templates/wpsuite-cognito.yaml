        -
          Ref: "ExistingIdentityPoolId"
  AuthenticatedRoleArn:
    Description: "Authenticated Cognito Identity role ARN."
    Value:
      Fn::If:
        - "CondCreateIdentityPoolWithNewUserPool"
        -
          Fn::GetAtt:
            - "AuthenticatedRole"
            - "Arn"
        -
          Ref: "ExistingAuthenticatedRoleArn"
  RegisteredRoleArn:
    Description: "Registered Cognito Identity role ARN."
    Value:
      Fn::If:
        - "CondCreateIdentityPoolWithNewUserPool"
        -
          Fn::GetAtt:
            - "RegisteredRole"
            - "Arn"
        -
          Ref: "ExistingRegisteredRoleArn"
  RegisteredGroupName:
    Description: "Default registered group name."
    Value:
      Ref: "RegisteredGroupName"
  EmailTemplateBucketName:
    Description: "Email template bucket name."
    Value:
      Fn::If:
        - "CondCreateEmailTemplateBucket"
        -
          Ref: "EmailTemplateBucket"
        -
          Ref: "EmailTemplateBucketName"
    Condition: "OutputEmailTemplateBucketNameTemplateEnabledCondition"
  SesIdentityValue:
    Description: "Resolved SES identity."
