AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Flow backend nested template for Marketplace Deployment Access"
Parameters:
  PrmTagValue:
    Type: "String"
    Default: "pc:5d8wq5hg1d54kb933ntenntiu"
    AllowedPattern: "^pc:[a-z0-9]+$"
    Description: "AWS Partner Revenue Measurement tag value for WP Suite Deployment Access resources."
  Enabled:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create Flow backend resources in this nested stack."
  TemplateVersion:
    Type: "String"
    Default: "v1.0.43"
    Description: "Immutable WP Suite deployment template version."
  ArtifactRootPrefix:
    Type: "String"
    Description: "Buyer-owned S3 prefix containing staged WP Suite artifacts."
  ArtifactBucketName:
    Type: "String"
    Default: "wpsuite-artifacts"
    Description: "S3 bucket that stores the published deployment artifacts for this application."
  BackupSelectionTagValue:
    Type: "String"
    Default: ""
    Description: "Deployment-scoped tag value used by the optional WP Suite DR backup plan."
  AppName:
    Type: "String"
    Default: "wpsuite-flow"
    Description: "Application name prefix used when naming Flow resources."
  Environment:
    Type: "String"
    Default: "prod"
    AllowedValues:
      - "dev"
      - "staging"
      - "prod"
    Description: "Deployment environment used in generated resource names."
  FrontendApiAuthMode:
    Type: "String"
    Default: "NONE"
    AllowedValues:
      - "NONE"
      - "IAM"
    Description: "Authentication mode for public frontend submission endpoints."
  AdminApiAuthMode:
    Type: "String"
    Default: "COGNITO"
    AllowedValues:
      - "NONE"
      - "IAM"
      - "COGNITO"
    Description: "Authentication mode for admin management endpoints."
  AdminCognitoUserPoolId:
    Type: "String"
    Default: ""
    Description: "Cognito user pool ID for admin authentication when AdminApiAuthMode is COGNITO."
  AdminCognitoAuthScopes:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "Optional OAuth scopes required on admin endpoints when Cognito auth is enabled."
  EnableRecaptcha:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable Google reCAPTCHA validation for public form submissions."
  RecaptchaMode:
    Type: "String"
    Default: "classic"
    AllowedValues:
      - "classic"
      - "enterprise"
    Description: "Which reCAPTCHA product to use when reCAPTCHA protection is enabled."
  RecaptchaProjectId:
    Type: "String"
    Default: ""
    Description: "Google Cloud project ID for reCAPTCHA Enterprise."
  RecaptchaSiteKey:
    Type: "String"
    Default: ""
    Description: "Public reCAPTCHA site key expected from the frontend."
  SharedRecaptchaSecretParameterName:
    Type: "String"
    Default: ""
    Description: "Deployment-wide reCAPTCHA secret SSM parameter name created by the Cognito nested stack."
  SharedRegionalWebACLArn:
    Type: "String"
    Default: ""
    Description: "Deployment-wide regional WAF WebACL ARN shared by WP Suite API stacks."
  SharedRecaptchaSecretParameterArn:
    Type: "String"
    Default: ""
    AllowedPattern: "^$|arn:[a-zA-Z0-9-]+:[a-zA-Z0-9-]+:[a-z0-9-]*:[0-9]{12}:.+$"
    Description: "Deployment-wide reCAPTCHA secret SSM parameter ARN created by the Cognito nested stack."
  SharedRecaptchaKmsKeyArn:
    Type: "String"
    Default: ""
    AllowedPattern: "^$|arn:[a-zA-Z0-9-]+:[a-zA-Z0-9-]+:[a-z0-9-]*:[0-9]{12}:.+$"
    Description: "Deployment-wide reCAPTCHA secret KMS key ARN created by the Cognito nested stack."
  RecaptchaSecretKey:
    Type: "String"
    Default: ""
    Description: "Secret reCAPTCHA key stored in SSM Parameter Store when provided."
    NoEcho: true
  RecaptchaScoreThreshold:
    Type: "Number"
    Default: 0.5
    Description: "Minimum accepted reCAPTCHA score from 0.0 to 1.0."
  EnableWAF:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable AWS WAF protection for the Flow API."
  EnableDetailedApiLogging:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable INFO-level API Gateway execution logs. Disabled uses ERROR-level logs."
  PublicAllowedIPs:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "Optional CIDR allowlist for frontend form endpoints."
  AdminAllowedIPs:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "Optional CIDR allowlist for admin endpoints."
  BlockedIPs:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "Optional CIDR ranges to block for all API traffic."
  EnableKmsForSecrets:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create a dedicated KMS key for encrypting SSM-stored secrets."
  EnableGuardDutyMalwareProtection:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable GuardDuty Malware Protection for the payload bucket."
  EnableDynamoDbPointInTimeRecovery:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable point-in-time recovery for persistent Flow DynamoDB tables."
  EnableAlerts:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable SNS topic creation for Flow operational alerts. Confirm pending subscriptions from the buyer SNS console by pasting the email confirmation URL; do not open the email link directly."
  AlertEmailAddress1:
    Type: "String"
    Default: ""
    Description: "Email recipient 1 for SNS operational alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress2:
    Type: "String"
    Default: ""
    Description: "Email recipient 2 for SNS operational alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress3:
    Type: "String"
    Default: ""
    Description: "Email recipient 3 for SNS operational alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress4:
    Type: "String"
    Default: ""
    Description: "Email recipient 4 for SNS operational alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress5:
    Type: "String"
    Default: ""
    Description: "Email recipient 5 for SNS operational alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  DataRetentionDays:
    Type: "Number"
    Default: 30
    Description: "Number of days to retain submission data before TTL cleanup."
  LogRetentionDays:
    Type: "Number"
    Default: "14"
    AllowedValues:
      - "1"
      - "3"
      - "5"
      - "7"
      - "14"
      - "30"
      - "60"
      - "90"
      - "120"
      - "150"
      - "180"
      - "365"
      - "400"
      - "545"
      - "731"
      - "1827"
      - "3653"
    Description: "Number of days to retain CloudWatch logs for Flow resources."
  LambdaMemorySize:
    Type: "Number"
    Default: 1024
    Description: "Memory size in MB allocated to Flow Lambda functions."
  LambdaTimeout:
    Type: "Number"
    Default: 30
    Description: "Maximum execution time in seconds for Flow Lambda functions."
  LogLevel:
    Type: "String"
    Default: "INFO"
    AllowedValues:
      - "DEBUG"
      - "INFO"
      - "WARN"
      - "ERROR"
    Description: "Application log level used by Flow Lambda functions."
  TemplatesBucketName:
    Type: "String"
    Default: ""
    Description: "Existing S3 bucket for email templates. Leave empty to create one."
  PayloadBucketName:
    Type: "String"
    Default: ""
    Description: "Existing S3 bucket for uploaded files. Leave empty to create one."
  PayloadPrefix:
    Type: "String"
    Default: "uploads/"
    Description: "S3 prefix used to store and resolve uploaded attachment objects."
  TemplatesPrefix:
    Type: "String"
    Default: "templates/"
    Description: "S3 prefix used to store and resolve email template files."
  FromEmail:
    Type: "String"
    Default: ""
    Description: "SES-verified email address used as the sender for outbound email actions."
  DefaultWebhookSigningSecret:
    Type: "String"
    Default: ""
    Description: "Optional default HMAC secret used to sign webhook payloads."
    NoEcho: true
  ApiCustomDomainName:
    Type: "String"
    Default: ""
    AllowedPattern: "^$|^[a-zA-Z0-9.-]+\\.[a-zA-Z]{2,}$"
    ConstraintDescription: "Must be a valid domain name or empty."
    Description: "Custom domain name for the API (optional, e.g. forms.example.com)"
  AcmCertificateArn:
    Type: "String"
    Default: ""
    AllowedPattern: "^$|^arn:aws(-[a-z0-9-]+)?:acm:[a-z0-9-]+:[0-9]{12}:certificate/[a-f0-9-]+$"
    ConstraintDescription: "Must be a valid ACM certificate ARN or empty."
    Description: "ACM certificate ARN for the custom domain (required when ApiCustomDomainName is set)"
  EnableRoute53:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable automatic Route53 alias record creation for the custom domain"
  Route53HostedZoneId:
    Type: "String"
    Default: ""
    AllowedPattern: "^$|^[A-Z0-9]{10,32}$"
    ConstraintDescription: "Must be a valid hosted zone ID or empty."
    Description: "Route53 hosted zone ID (optional, auto-discovered when empty)"
Mappings:
  WpSuiteMarketplace:
    DeploymentAccess:
      ProductCode: "5d8wq5hg1d54kb933ntenntiu"
Conditions:
  TemplateEnabled:
    Fn::Equals:
      -
        Ref: "Enabled"
      - "true"
  UseCustomDomain:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "ApiCustomDomainName"
          - ""
  UseRoute53:
    Fn::And:
      -
        Condition: "UseCustomDomain"
      -
        Fn::Equals:
          -
            Ref: "EnableRoute53"
          - "true"
  UseProvidedHostedZoneId:
    Fn::And:
      -
        Condition: "UseRoute53"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Ref: "Route53HostedZoneId"
              - ""
  EnableRecaptchaProtection:
    Fn::Equals:
      -
        Ref: "EnableRecaptcha"
      - "true"
  UseSharedRecaptchaSecret:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "SharedRecaptchaSecretParameterName"
          - ""
  HasLocalRecaptchaSecret:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "RecaptchaSecretKey"
          - ""
  CreateLocalRecaptchaSecret:
    Fn::And:
      -
        Condition: "EnableRecaptchaProtection"
      -
        Fn::Not:
          -
            Condition: "UseSharedRecaptchaSecret"
      -
        Condition: "HasLocalRecaptchaSecret"
  HasRecaptchaSecretParameter:
    Fn::And:
      -
        Condition: "EnableRecaptchaProtection"
      -
        Fn::Or:
          -
            Condition: "UseSharedRecaptchaSecret"
          -
            Condition: "CreateLocalRecaptchaSecret"
  WAFEnabled:
    Fn::Equals:
      -
        Ref: "EnableWAF"
      - "true"
  HasSharedRegionalWebACL:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "SharedRegionalWebACLArn"
          - ""
  CreateLocalWAF:
    Fn::And:
      -
        Condition: "WAFEnabled"
      -
        Fn::Not:
          -
            Condition: "HasSharedRegionalWebACL"
  HasPublicAllowedIPs:
    Fn::And:
      -
        Condition: "CreateLocalWAF"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Fn::Join:
                  - ""
                  -
                    Ref: "PublicAllowedIPs"
              - ""
  HasAdminAllowedIPs:
    Fn::And:
      -
        Condition: "CreateLocalWAF"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Fn::Join:
                  - ""
                  -
                    Ref: "AdminAllowedIPs"
              - ""
  HasBlockedIPs:
    Fn::And:
      -
        Condition: "CreateLocalWAF"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Fn::Join:
                  - ""
                  -
                    Ref: "BlockedIPs"
              - ""
  CondEnableDetailedApiLogging:
    Fn::Equals:
      -
        Ref: "EnableDetailedApiLogging"
      - "true"
  UseAdminCognito:
    Fn::And:
      -
        Fn::Equals:
          -
            Ref: "AdminApiAuthMode"
          - "COGNITO"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Ref: "AdminCognitoUserPoolId"
              - ""
  UseProvidedTemplatesBucket:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "TemplatesBucketName"
          - ""
  CreateTemplatesBucket:
    Fn::Equals:
      -
        Ref: "TemplatesBucketName"
      - ""
  UseProvidedPayloadBucket:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "PayloadBucketName"
          - ""
  CreatePayloadBucket:
    Fn::Equals:
      -
        Ref: "PayloadBucketName"
      - ""
  CreateKmsKey:
    Fn::Equals:
      -
        Ref: "EnableKmsForSecrets"
      - "true"
  GuardDutyMalwareProtectionEnabled:
    Fn::Equals:
      -
        Ref: "EnableGuardDutyMalwareProtection"
      - "true"
  AlertsEnabled:
    Fn::Equals:
      -
        Ref: "EnableAlerts"
      - "true"
  HasAlertEmailAddress1:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress1"
          - ""
  AlertEmailAddress1Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress1"
  HasAlertEmailAddress2:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress2"
          - ""
  AlertEmailAddress2Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress2"
  HasAlertEmailAddress3:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress3"
          - ""
  AlertEmailAddress3Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress3"
  HasAlertEmailAddress4:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress4"
          - ""
  AlertEmailAddress4Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress4"
  HasAlertEmailAddress5:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress5"
          - ""
  AlertEmailAddress5Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress5"
  HasDefaultWebhookSigningSecret:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "DefaultWebhookSigningSecret"
          - ""
  DynamoDbPointInTimeRecoveryEnabled:
    Fn::Equals:
      -
        Ref: "EnableDynamoDbPointInTimeRecovery"
      - "true"
  ApiDomainNameTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseCustomDomain"
  AdminAuthorizerTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseAdminCognito"
  AlertsTopicTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertsEnabled"
  AlertsEmailSubscription1TemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertEmailAddress1Enabled"
  AlertsEmailSubscription2TemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertEmailAddress2Enabled"
  AlertsEmailSubscription3TemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertEmailAddress3Enabled"
  AlertsEmailSubscription4TemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertEmailAddress4Enabled"
  AlertsEmailSubscription5TemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertEmailAddress5Enabled"
  DeadLetterQueueMessagesAlarmTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertsEnabled"
  SecretsKmsKeyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateKmsKey"
  SecretsKmsAliasTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateKmsKey"
  TemplatesBucketTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateTemplatesBucket"
  PayloadBucketTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreatePayloadBucket"
  TemplatesBucketCleanerTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateTemplatesBucket"
  PayloadBucketCleanerTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreatePayloadBucket"
  CustomResourceManagerTemplatesBucketCleanupPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateTemplatesBucket"
  CustomResourceManagerPayloadBucketCleanupPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreatePayloadBucket"
  CustomResourceManagerFunctionKmsPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateKmsKey"
  RecaptchaSecretParameterTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateLocalRecaptchaSecret"
  DefaultWebhookSigningSecretParameterTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasDefaultWebhookSigningSecret"
  GuardDutyMalwareProtectionRoleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "GuardDutyMalwareProtectionEnabled"
  GuardDutyMalwareProtectionPlanTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "GuardDutyMalwareProtectionEnabled"
  PublicAllowedIpSetTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasPublicAllowedIPs"
  AdminAllowedIpSetTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasAdminAllowedIPs"
  BlockedIpSetTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasBlockedIPs"
  WebAclTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateLocalWAF"
  FormsApiFunctionKmsPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateKmsKey"
  FormsApiFunctionSharedRecaptchaKmsPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseSharedRecaptchaSecret"
  ApiBasePathMappingTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseCustomDomain"
  HostedZoneLookupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseRoute53"
  DnsRecordATemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseRoute53"
  DnsRecordAAAATemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseRoute53"
  WebAclAssociationTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "WAFEnabled"
  WebhookDispatcherFunctionKmsPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateKmsKey"
  OutputRecaptchaSecretParameterNameTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasRecaptchaSecretParameter"
  OutputAlertsTopicArnTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertsEnabled"
  OutputAlertsTopicNameTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "AlertsEnabled"
  OutputCustomDomainUrlTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseCustomDomain"
  OutputRegionalDomainNameTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseCustomDomain"
  OutputRegionalHostedZoneIdTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseCustomDomain"
Resources:
  ApiGatewayCloudWatchLogsRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "apigateway.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        -
          Fn::Sub: "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  ApiGatewayAccountConfig:
    Type: "Custom::ApiGatewayAccount"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CustomResourceManagerFunction"
          - "Arn"
      CloudWatchRoleArn:
        Fn::GetAtt:
          - "ApiGatewayCloudWatchLogsRole"
          - "Arn"
    Condition: "TemplateEnabled"
  RestApi:
    Type: "AWS::ApiGateway::RestApi"
    Properties:
      Name:
        Fn::Sub: "${AppName}-api"
      Description:
        Fn::Sub: "${AppName} WP Suite Flow API"
      EndpointConfiguration:
        Types:
          - "REGIONAL"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    DependsOn:
      - "ApiGatewayAccountConfig"
    Condition: "TemplateEnabled"
  Default4xxGatewayResponse:
    Type: "AWS::ApiGateway::GatewayResponse"
    Properties:
      RestApiId:
        Ref: "RestApi"
      ResponseType: "DEFAULT_4XX"
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-Request-Id,X-Recaptcha-Token'"
        gatewayresponse.header.Cache-Control: "'no-store'"
        gatewayresponse.header.Strict-Transport-Security: "'max-age=31536000'"
        gatewayresponse.header.X-Content-Type-Options: "'nosniff'"
    Condition: "TemplateEnabled"
  Default5xxGatewayResponse:
    Type: "AWS::ApiGateway::GatewayResponse"
    Properties:
      RestApiId:
        Ref: "RestApi"
      ResponseType: "DEFAULT_5XX"
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-Request-Id,X-Recaptcha-Token'"
        gatewayresponse.header.Cache-Control: "'no-store'"
        gatewayresponse.header.Strict-Transport-Security: "'max-age=31536000'"
        gatewayresponse.header.X-Content-Type-Options: "'nosniff'"
    Condition: "TemplateEnabled"
  UnauthorizedGatewayResponse:
    Type: "AWS::ApiGateway::GatewayResponse"
    Properties:
      RestApiId:
        Ref: "RestApi"
      ResponseType: "UNAUTHORIZED"
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-Request-Id,X-Recaptcha-Token'"
        gatewayresponse.header.Cache-Control: "'no-store'"
        gatewayresponse.header.Strict-Transport-Security: "'max-age=31536000'"
        gatewayresponse.header.X-Content-Type-Options: "'nosniff'"
    Condition: "TemplateEnabled"
  AccessDeniedGatewayResponse:
    Type: "AWS::ApiGateway::GatewayResponse"
    Properties:
      RestApiId:
        Ref: "RestApi"
      ResponseType: "ACCESS_DENIED"
      ResponseParameters:
