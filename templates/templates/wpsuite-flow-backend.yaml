      LogGroupName:
        Fn::Sub: "/aws/lambda/${AppName}-webhook-dispatcher"
      RetentionInDays:
        Ref: "LogRetentionDays"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  WebhookDispatcherFunctionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyName: "WebhookDispatcherFunctionRolePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "dynamodb:BatchGetItem"
                  - "dynamodb:BatchWriteItem"
                  - "dynamodb:ConditionCheckItem"
                  - "dynamodb:DeleteItem"
                  - "dynamodb:DescribeTable"
                  - "dynamodb:GetItem"
                  - "dynamodb:GetRecords"
                  - "dynamodb:GetShardIterator"
                  - "dynamodb:PutItem"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                  - "dynamodb:UpdateItem"
                Resource:
                  -
                    Fn::GetAtt:
                      - "SubmissionEventsTable"
                      - "Arn"
                  -
                    Fn::Sub:
                      - "${TableArn}/index/*"
                      -
                        TableArn:
                          Fn::GetAtt:
                            - "SubmissionEventsTable"
                            - "Arn"
              -
                Effect: "Allow"
                Action:
                  - "dynamodb:BatchGetItem"
                  - "dynamodb:DescribeTable"
                  - "dynamodb:GetItem"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                Resource:
                  -
                    Fn::GetAtt:
                      - "WebhookEndpointsTable"
                      - "Arn"
                  -
                    Fn::Sub:
                      - "${TableArn}/index/*"
                      -
                        TableArn:
                          Fn::GetAtt:
                            - "WebhookEndpointsTable"
                            - "Arn"
              -
                Effect: "Allow"
                Action:
                  - "ssm:GetParameter"
                  - "events:PutEvents"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "sqs:SendMessage"
                Resource:
                  Fn::GetAtt:
                    - "DeadLetterQueue"
                    - "Arn"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  WebhookDispatcherFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName:
        Fn::Sub: "${AppName}-webhook-dispatcher"
      Code:
        S3Bucket:
          Ref: "ArtifactBucketName"
        S3Key:
          Fn::Join:
            - ""
            -
              -
                Ref: "ArtifactRootPrefix"
              - "wpsuite-flow/functions/webhook-dispatcher.zip"
      Handler: "index.handler"
      Runtime: "nodejs24.x"
      Architectures:
        - "arm64"
      MemorySize:
        Ref: "LambdaMemorySize"
      Timeout:
        Ref: "LambdaTimeout"
      TracingConfig:
        Mode: "Active"
      Role:
        Fn::GetAtt:
          - "WebhookDispatcherFunctionRole"
          - "Arn"
      Environment:
        Variables:
          APP_NAME:
            Ref: "AppName"
          ENVIRONMENT:
            Ref: "Environment"
          WPSUITE_MARKETPLACE_DEPLOYMENT_PRODUCT_CODE: "5d8wq5hg1d54kb933ntenntiu"
          AWS_SDK_UA_APP_ID: "APN_1.1/pc_5d8wq5hg1d54kb933ntenntiu$"
          EVENT_BUS_NAME: "default"
          SUBMISSIONS_TABLE:
            Ref: "SubmissionsTable"
          SUBMISSION_EVENTS_TABLE:
            Ref: "SubmissionEventsTable"
          TEMPLATES_TABLE:
            Ref: "TemplatesTable"
          WORKFLOW_DEFINITIONS_TABLE:
            Ref: "WorkflowDefinitionsTable"
          FORM_DEFINITIONS_TABLE:
            Ref: "FormDefinitionsTable"
          WEBHOOK_ENDPOINTS_TABLE:
            Ref: "WebhookEndpointsTable"
          PROCESS_MAPS_TABLE:
            Ref: "ProcessMapsTable"
          ENABLE_RECAPTCHA:
            Ref: "EnableRecaptcha"
          RECAPTCHA_MODE:
            Ref: "RecaptchaMode"
          RECAPTCHA_PROJECT_ID:
            Ref: "RecaptchaProjectId"
          RECAPTCHA_SITE_KEY:
            Ref: "RecaptchaSiteKey"
          RECAPTCHA_SCORE_THRESHOLD:
            Ref: "RecaptchaScoreThreshold"
          TEMPLATES_BUCKET:
            Fn::If:
              - "UseProvidedTemplatesBucket"
              -
                Ref: "TemplatesBucketName"
              -
                Ref: "TemplatesBucket"
          PAYLOAD_BUCKET:
            Fn::If:
              - "UseProvidedPayloadBucket"
              -
                Ref: "PayloadBucketName"
              -
                Ref: "PayloadBucket"
          PAYLOAD_PREFIX:
            Ref: "PayloadPrefix"
          TEMPLATES_PREFIX:
            Ref: "TemplatesPrefix"
          FROM_EMAIL:
            Ref: "FromEmail"
          LOG_LEVEL:
            Ref: "LogLevel"
          DATA_RETENTION_DAYS:
            Ref: "DataRetentionDays"
          DEFAULT_WEBHOOK_SIGNING_SECRET_PARAMETER_NAME:
            Fn::If:
              - "HasDefaultWebhookSigningSecret"
              -
                Ref: "DefaultWebhookSigningSecretParameter"
              - ""
      DeadLetterConfig:
        TargetArn:
          Fn::GetAtt:
            - "DeadLetterQueue"
            - "Arn"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  WebhookDispatcherEventRule:
    Type: "AWS::Events::Rule"
    Properties:
      EventPattern:
        source:
          - "wpsuite.forms"
        detail-type:
          - "integration.webhook.requested"
      State: "ENABLED"
      Targets:
        -
          Arn:
            Fn::GetAtt:
              - "WebhookDispatcherFunction"
              - "Arn"
          Id: "WebhookDispatcherFunction"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  WebhookDispatcherEventPermission:
    Type: "AWS::Lambda::Permission"
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName:
        Ref: "WebhookDispatcherFunction"
      Principal: "events.amazonaws.com"
      SourceArn:
        Fn::GetAtt:
          - "WebhookDispatcherEventRule"
          - "Arn"
    Condition: "TemplateEnabled"
  WebhookDispatcherFunctionKmsPolicy:
    Type: "AWS::IAM::Policy"
    Properties:
      PolicyName: "WebhookDispatcherFunctionKmsPolicy"
      Roles:
        -
          Ref: "WebhookDispatcherFunctionRole"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Action:
              - "kms:Decrypt"
              - "kms:DescribeKey"
              - "kms:Encrypt"
              - "kms:GenerateDataKey"
            Resource:
              Fn::GetAtt:
                - "SecretsKmsKey"
                - "Arn"
    Condition: "WebhookDispatcherFunctionKmsPolicyTemplateEnabledCondition"
Outputs:
  PrmProductCode:
    Description: "AWS Marketplace product code used for WP Suite Deployment Access PRM attribution."
    Value:
      Fn::FindInMap:
        - "WpSuiteMarketplace"
        - "DeploymentAccess"
        - "ProductCode"
  TemplateFamily:
    Description: "Template family identifier."
    Value: "wpsuite-flow-backend"
  TemplateVersion:
    Description: "Template version used for this nested stack."
    Value:
      Ref: "TemplateVersion"
  ApiUrl:
    Description: "Flow API URL."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::If:
            - "UseCustomDomain"
            -
              Fn::Sub: "https://${ApiCustomDomainName}"
            -
              Fn::Sub: "https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/prod"
        - ""
  TemplatesBucketOutput:
    Description: "Resolved templates bucket name."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::If:
            - "UseProvidedTemplatesBucket"
            -
              Ref: "TemplatesBucketName"
            -
              Ref: "TemplatesBucket"
        - ""
  PayloadBucketOutput:
    Description: "Resolved payload bucket name."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::If:
            - "UseProvidedPayloadBucket"
            -
              Ref: "PayloadBucketName"
            -
              Ref: "PayloadBucket"
        - ""
  PayloadPrefixOutput:
    Description: "Resolved payload object prefix."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Ref: "PayloadPrefix"
        - ""
  RecaptchaSecretParameterName:
    Description: "reCAPTCHA secret parameter name."
    Value:
      Fn::If:
        - "UseSharedRecaptchaSecret"
        -
          Ref: "SharedRecaptchaSecretParameterName"
        -
          Ref: "RecaptchaSecretParameter"
    Condition: "OutputRecaptchaSecretParameterNameTemplateEnabledCondition"
  AlertsTopicArn:
    Description: "SNS Topic ARN for Flow alerts."
    Value:
      Ref: "AlertsTopic"
    Condition: "OutputAlertsTopicArnTemplateEnabledCondition"
  AlertsTopicName:
    Description: "SNS Topic Name for Flow alerts."
    Value:
      Fn::GetAtt:
        - "AlertsTopic"
        - "TopicName"
    Condition: "OutputAlertsTopicNameTemplateEnabledCondition"
  CustomDomainUrl:
    Description: "Custom domain URL."
    Value:
      Fn::Sub: "https://${ApiCustomDomainName}"
    Condition: "OutputCustomDomainUrlTemplateEnabledCondition"
  RegionalDomainName:
    Description: "API Gateway regional domain name."
    Value:
      Fn::GetAtt:
        - "ApiDomainName"
        - "RegionalDomainName"
    Condition: "OutputRegionalDomainNameTemplateEnabledCondition"
  RegionalHostedZoneId:
    Description: "API Gateway regional hosted zone ID."
    Value:
      Fn::GetAtt:
        - "ApiDomainName"
        - "RegionalHostedZoneId"
    Condition: "OutputRegionalHostedZoneIdTemplateEnabledCondition"
