              Ref: "LogRetentionDays"
        Enabled:
          Fn::If:
            - "CondUseMarketplaceSecret"
            -
              Fn::Sub:
                - "{{resolve:secretsmanager:${DeploymentSecretArn}:SecretString:DeployCognito}}"
