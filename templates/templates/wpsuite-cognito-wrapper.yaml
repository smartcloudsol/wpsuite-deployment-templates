AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Cognito Marketplace deployment wrapper template"
Parameters:
  PrmTagValue:
    Type: "String"
    Default: "pc:5d8wq5hg1d54kb933ntenntiu"
    AllowedPattern: "^pc:[a-z0-9]+$"
    Description: "AWS Partner Revenue Measurement tag value for WP Suite Deployment Access resources."
  MPS3BucketName:
    Type: "String"
    Description: "Public S3 bucket that contains the reviewed WP Suite CloudFormation templates."
  MPS3BucketRegion:
    Type: "String"
    Description: "Marketplace-provided bucket region that contains the reviewed WP Suite templates."
  MPS3KeyPrefix:
    Type: "String"
    Description: "S3 key prefix for the reviewed WP Suite nested CloudFormation templates."
  WpSuiteDeploymentSecretArn:
    Type: "String"
    Description: "AWS Marketplace Deployment Service secret ARN containing the WP Suite deployment context."
    MinLength: 1
    NoEcho: true
  DeploymentContextMode:
    Type: "String"
    Default: "direct"
    AllowedValues:
      - "marketplace_secret"
      - "direct"
    Description: "How this wrapper receives the WP Suite deployment context."
  TemplateVersion:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter TemplateVersion."
  ArtifactBucketName:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter ArtifactBucketName."
  ArtifactRootPrefix:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter ArtifactRootPrefix."
  LogRetentionDays:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter LogRetentionDays."
  Enabled:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter Enabled."
  AppName:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter AppName."
  ExistingUserPoolId:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter ExistingUserPoolId."
  ExistingUserPoolClientId:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter ExistingUserPoolClientId."
  ExistingIdentityPoolId:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter ExistingIdentityPoolId."
  PostLoginRedirectUrl:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter PostLoginRedirectUrl."
  RegisteredGroupName:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RegisteredGroupName."
  AdminGroupName:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter AdminGroupName."
  CreateIdentityPool:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter CreateIdentityPool."
  EnableCustomEmailSender:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter EnableCustomEmailSender."
  EnableRecaptcha:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter EnableRecaptcha."
  RecaptchaMode:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RecaptchaMode."
  RecaptchaProjectId:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RecaptchaProjectId."
  RecaptchaSiteKey:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RecaptchaSiteKey."
  RecaptchaSecretKey:
    Type: "String"
    Description: "Forwarded WP Suite nested stack parameter RecaptchaSecretKey."
    NoEcho: true
  RecaptchaScoreThreshold:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RecaptchaScoreThreshold."
  UserPoolName:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter UserPoolName."
  LoginMechanisms:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter LoginMechanisms."
  OAuthScopes:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter OAuthScopes."
  RequireEmailAttribute:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RequireEmailAttribute."
  RequireGivenNameAttribute:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RequireGivenNameAttribute."
  RequireFamilyNameAttribute:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RequireFamilyNameAttribute."
  RequirePhoneNumberAttribute:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RequirePhoneNumberAttribute."
  EnablePreSignUp:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter EnablePreSignUp."
  EnablePreTokenGeneration:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter EnablePreTokenGeneration."
  EnablePostConfirmation:
