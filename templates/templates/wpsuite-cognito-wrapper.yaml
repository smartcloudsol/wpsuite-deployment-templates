    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter CreateCustomDomain."
  RegisterRoute53Alias:
    Type: "String"
    Default: ""
    Description: "Forwarded WP Suite nested stack parameter RegisterRoute53Alias."
