      TemplateURL:
        Fn::Sub:
          - "https://${Bucket}.s3.${Region}.${AWS::URLSuffix}/${Prefix}/${TemplatePath}"
          -
            Bucket:
              Ref: "MPS3BucketName"
            Region:
              Ref: "MPS3BucketRegion"
            Prefix:
              Ref: "MPS3KeyPrefix"
            TemplatePath: "wpsuite-cognito.yaml"
Outputs:
  PrmProductCode:
    Description: "AWS Marketplace product code used for WP Suite Deployment Access PRM attribution."
    Value:
      Fn::FindInMap:
        - "WpSuiteMarketplace"
        - "DeploymentAccess"
        - "ProductCode"
  UserPoolId:
    Description: "Forwarded UserPoolId output from wpsuite-cognito.yaml."
    Value:
      Fn::GetAtt:
        - "WrappedNestedStack"
        - "Outputs.UserPoolId"
  UserPoolClientId:
    Description: "Forwarded UserPoolClientId output from wpsuite-cognito.yaml."
    Value:
      Fn::GetAtt:
        - "WrappedNestedStack"
        - "Outputs.UserPoolClientId"
  IdentityPoolId:
    Description: "Forwarded IdentityPoolId output from wpsuite-cognito.yaml."
    Value:
      Fn::GetAtt:
        - "WrappedNestedStack"
        - "Outputs.IdentityPoolId"
