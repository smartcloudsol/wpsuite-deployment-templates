AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Site Guardian nested template for Marketplace Deployment Access"
Parameters:
  PrmTagValue:
    Type: "String"
    Default: "pc:5d8wq5hg1d54kb933ntenntiu"
    AllowedPattern: "^pc:[a-z0-9]+$"
    Description: "AWS Partner Revenue Measurement tag value for WP Suite Deployment Access resources."
  Enabled:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create Static Site Guardian resources in this nested stack."
  TemplateVersion:
    Type: "String"
    Default: "v1.0.9"
    Description: "Immutable WP Suite deployment template version."
  ArtifactRootPrefix:
    Type: "String"
    Description: "Buyer-owned S3 prefix containing staged WP Suite artifacts."
  ArtifactBucketName:
    Type: "String"
    Default: "wpsuite-artifacts"
    Description: "S3 bucket that stores the published deployment artifacts for this application."
  AppName:
    Type: "String"
    Default: "wpsuite-site-guardian"
    Description: "Short application name used for generated resource names and SSM parameter paths."
  DomainName:
    Type: "String"
    Default: "example.com"
    Description: "Custom domain for CloudFront distribution."
  CertificateArn:
    Type: "String"
    Description: "ARN of the SSL certificate in ACM us-east-1."
  CognitoUserPoolId:
    Type: "String"
    Default: ""
    Description: "Cognito User Pool ID for JWT issuer validation."
  CognitoAppClientIds:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "Comma-separated list of Cognito App Client IDs for JWT audience validation."
  ProtectedPaths:
    Type: "CommaDelimitedList"
    Default: "/restricted"
    Description: "List of paths to protect with signed cookies."
  ProtectedPathGroupMap:
    Type: "String"
    Default: "{}"
    Description: "Optional JSON object mapping protected paths to allowed groups."
  SigninPagePath:
    Type: "String"
    Default: "/signin"
    Description: "Path to redirect unauthenticated users for sign-in."
  CookieExpirationDays:
    Type: "Number"
    Default: 30
    Description: "Cookie expiration in days."
  ManageSigningKeys:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Automatically generate and manage the CloudFront signing key pair, KMS key, and SSM parameters."
  PublicKeyContent:
    Type: "String"
    Default: ""
    Description: "Manual mode only. Base64 encoded RSA public key content."
  KmsKeyId:
    Type: "String"
    Default: ""
    Description: "Manual mode only. KMS Key ID containing the encrypted CloudFront private key."
  EnableDetailedLogging:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable detailed CloudWatch logging for troubleshooting."
  LogRetentionDays:
    Type: "Number"
    Default: 14
    Description: "Number of days to retain CloudWatch logs."
  S3BucketName:
    Type: "String"
    Default: ""
    Description: "Custom name for the S3 bucket hosting static files."
  S3WWWRoot:
    Type: "String"
    Default: "wwwroot"
    Description: "S3 wwwroot prefix without leading/trailing slash."
  NotFoundPagePath:
    Type: "String"
    Default: ""
    Description: "Optional path to custom 404 error page relative to S3WWWRoot."
  ForbiddenPagePath:
    Type: "String"
    Default: ""
    Description: "Optional path to custom 403 error page relative to S3WWWRoot."
  CreateDNSRecords:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create Route53 DNS records for the domains."
  WpsuiteAccountId:
    Type: "String"
    Default: ""
    Description: "Optional WP Suite account ID used by the weekly config refresh Lambda."
  WpsuiteSiteId:
    Type: "String"
    Default: ""
    Description: "Optional WP Suite site ID used by the weekly config refresh Lambda."
  WpsuiteSiteKey:
    Type: "String"
    Default: ""
    Description: "Optional WP Suite site key stored as a SecureString in SSM when weekly refresh is enabled."
    NoEcho: true
  WpsuiteApiBaseUrl:
    Type: "String"
    Default: "https://api.wpsuite.io"
    Description: "Base URL for WP Suite license refresh requests."
  LicenseRefreshScheduleExpression:
    Type: "String"
    Default: "rate(7 days)"
    Description: "EventBridge schedule expression for refreshing config.enc and lic.jws."
Mappings:
  WpSuiteMarketplace:
    DeploymentAccess:
      ProductCode: "5d8wq5hg1d54kb933ntenntiu"
Conditions:
  TemplateEnabled:
    Fn::Equals:
      -
        Ref: "Enabled"
      - "true"
  EnableLogging:
    Fn::Equals:
      -
        Ref: "EnableDetailedLogging"
      - "true"
  UseCustomBucketName:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "S3BucketName"
          - ""
  CreateDNS:
    Fn::Equals:
      -
        Ref: "CreateDNSRecords"
      - "true"
  ManageSigningKeyMaterial:
    Fn::Equals:
      -
        Ref: "ManageSigningKeys"
      - "true"
  HasNotFoundPage:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "NotFoundPagePath"
          - ""
  HasForbiddenPage:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "ForbiddenPagePath"
          - ""
  HasWpsuiteAccountId:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "WpsuiteAccountId"
          - ""
  HasWpsuiteSiteId:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "WpsuiteSiteId"
          - ""
  HasWpsuiteSiteKey:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "WpsuiteSiteKey"
          - ""
  EnableWeeklyLicenseRefresh:
    Fn::And:
      -
        Condition: "HasWpsuiteAccountId"
      -
        Condition: "HasWpsuiteSiteId"
      -
        Condition: "HasWpsuiteSiteKey"
  SigningKeyMaterialTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "ManageSigningKeyMaterial"
  SiteKeyParameterTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableWeeklyLicenseRefresh"
  LicenseRefreshFunctionTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableWeeklyLicenseRefresh"
  LicenseRefreshFunctionLogGroupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableWeeklyLicenseRefresh"
  LicenseRefreshScheduleTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableWeeklyLicenseRefresh"
  LicenseRefreshPermissionTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableWeeklyLicenseRefresh"
  HostedZoneLookupTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateDNS"
  WWWDNSRecordTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateDNS"
  ApexDNSRecordTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateDNS"
  MonitoringDashboardTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableLogging"
  OutputRoute53HostedZoneIdTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateDNS"
  OutputSiteKeyParameterNameTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableWeeklyLicenseRefresh"
  OutputLicenseRefreshFunctionArnTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableWeeklyLicenseRefresh"
  OutputMonitoringDashboardUrlTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "EnableLogging"
Resources:
  StaticSiteBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName:
        Fn::If:
          - "UseCustomBucketName"
          -
            Ref: "S3BucketName"
          -
            Ref: "AWS::NoValue"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          -
            ObjectOwnership: "BucketOwnerPreferred"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          -
            ServerSideEncryptionByDefault:
              SSEAlgorithm: "AES256"
      VersioningConfiguration:
        Status: "Enabled"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  CloudFrontResourceManagerRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyName: "CloudFrontResourceManagerRolePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "cloudfront:CreatePublicKey"
                  - "cloudfront:DeletePublicKey"
                  - "cloudfront:GetPublicKey"
                  - "cloudfront:CreateKeyGroup"
                  - "cloudfront:DeleteKeyGroup"
                  - "cloudfront:GetKeyGroup"
                  - "cloudfront:CreateFunction"
                  - "cloudfront:UpdateFunction"
                  - "cloudfront:DeleteFunction"
                  - "cloudfront:DescribeFunction"
                  - "cloudfront:PublishFunction"
                  - "cloudfront:CreateOriginAccessControl"
                  - "cloudfront:DeleteOriginAccessControl"
                  - "cloudfront:GetOriginAccessControl"
                  - "cloudfront:CreateResponseHeadersPolicy"
                  - "cloudfront:UpdateResponseHeadersPolicy"
                  - "cloudfront:DeleteResponseHeadersPolicy"
                  - "cloudfront:GetResponseHeadersPolicy"
                  - "cloudfront:GetDistribution"
                  - "cloudfront:GetDistributionConfig"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "cloudfront:UpdateDistribution"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/*"
              -
                Effect: "Allow"
                Action:
                  - "route53:ListHostedZones"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "kms:CreateKey"
                  - "kms:DescribeKey"
                  - "kms:ScheduleKeyDeletion"
                  - "kms:ListAliases"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "kms:CreateAlias"
                  - "kms:DeleteAlias"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/${AppName}-site-guardian-cf-pk"
              -
                Effect: "Allow"
                Action:
                  - "lambda:GetFunction"
                  - "lambda:UpdateFunctionCode"
                  - "lambda:PublishVersion"
                Resource:
                  Fn::GetAtt:
                    - "CookieSigningFunction"
                    - "Arn"
              -
                Effect: "Allow"
                Action:
                  - "lambda:CreateAlias"
                  - "lambda:UpdateAlias"
                Resource:
                  -
                    Fn::GetAtt:
                      - "CookieSigningFunction"
                      - "Arn"
                  -
                    Fn::Sub: "${CookieSigningFunction.Arn}:*"
              -
                Effect: "Allow"
                Action:
                  - "ssm:PutParameter"
                  - "ssm:GetParameter"
                  - "ssm:DeleteParameter"
                Resource:
                  -
                    Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AppName}/site-guardian/*"
                  -
                    Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cloudfront/private-key/*"
              -
                Effect: "Allow"
                Action:
                  - "s3:ListBucket"
                  - "s3:ListBucketVersions"
                  - "s3:ListBucketMultipartUploads"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:s3:::${StaticSiteBucket}"
              -
                Effect: "Allow"
                Action:
                  - "s3:DeleteObject"
                  - "s3:DeleteObjectVersion"
                  - "s3:AbortMultipartUpload"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:s3:::${StaticSiteBucket}/*"
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                  - "logs:PutRetentionPolicy"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  CloudFrontResourceManager:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName:
        Fn::Sub: "${AWS::StackName}-cloudfront-manager"
      Code:
        S3Bucket:
          Ref: "ArtifactBucketName"
        S3Key:
          Fn::Join:
            - ""
            -
              -
                Ref: "ArtifactRootPrefix"
              - "wpsuite-site-guardian/functions/cloudfront-manager.zip"
      Handler: "cloudfront_manager.lambda_handler"
      Description: "Manages CloudFront resources not supported by native CloudFormation"
      Runtime: "python3.12"
      Timeout: 900
      MemorySize: 512
      Role:
        Fn::GetAtt:
          - "CloudFrontResourceManagerRole"
          - "Arn"
      Environment:
        Variables:
          WPSUITE_MARKETPLACE_DEPLOYMENT_PRODUCT_CODE: "5d8wq5hg1d54kb933ntenntiu"
          AWS_SDK_UA_APP_ID: "APN_1.1/pc_5d8wq5hg1d54kb933ntenntiu$"
          STACK_NAME:
            Ref: "AWS::StackName"
          PUBLIC_KEY_CONTENT:
            Ref: "PublicKeyContent"
          PROTECTED_PATHS:
            Fn::Join:
              - ","
              -
                Ref: "ProtectedPaths"
          SIGNIN_PAGE_PATH:
            Ref: "SigninPagePath"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  CloudFrontResourceManagerLogGroupManager:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "LogGroupManager"
      LogGroupName:
        Fn::Sub: "/aws/lambda/${AWS::StackName}-cloudfront-manager"
      RetentionInDays:
        Ref: "LogRetentionDays"
    Condition: "TemplateEnabled"
  SigningKeyMaterial:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "SigningKeyMaterial"
      AppName:
        Ref: "AppName"
    Condition: "SigningKeyMaterialTemplateEnabledCondition"
  CloudFrontPublicKey:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "PublicKey"
      Name:
        Fn::Sub: "${AWS::StackName}-public-key"
      PublicKeyContent:
        Fn::If:
          - "ManageSigningKeyMaterial"
          -
            Fn::GetAtt:
              - "SigningKeyMaterial"
              - "PublicKeyContent"
          -
            Ref: "PublicKeyContent"
    Condition: "TemplateEnabled"
  CloudFrontKeyGroup:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "KeyGroup"
      Name:
        Fn::Sub: "${AWS::StackName}-key-group"
      PublicKeyId:
        Fn::GetAtt:
          - "CloudFrontPublicKey"
          - "PublicKeyId"
    Condition: "TemplateEnabled"
  OriginAccessControl:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "OriginAccessControl"
      Name:
        Fn::Sub: "${AWS::StackName}-OAC"
    Condition: "TemplateEnabled"
  NoCachePolicy:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "ResponsePolicy"
      Name:
        Fn::Sub: "${AWS::StackName}-NoCachePolicy"
    Condition: "TemplateEnabled"
  SiteKeyParameter:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "SSMParameter"
      Name:
        Fn::Sub: "/${AppName}/site-guardian/site-key"
      Value:
        Ref: "WpsuiteSiteKey"
    Condition: "SiteKeyParameterTemplateEnabledCondition"
  ViewerRequestFunction:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "Function"
      Name:
        Fn::Sub: "${AWS::StackName}-viewer-request"
      ProtectedPaths:
        Fn::Join:
          - ","
          -
            Ref: "ProtectedPaths"
      SigninPagePath:
        Ref: "SigninPagePath"
      S3WWWRoot:
        Ref: "S3WWWRoot"
    Condition: "TemplateEnabled"
  PathRewriteFunction:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "PathRewriteFunction"
      Name:
        Fn::Sub: "${AWS::StackName}-path-rewrite"
      ProtectedPaths:
        Fn::Join:
          - ","
          -
            Ref: "ProtectedPaths"
      S3WWWRoot:
        Ref: "S3WWWRoot"
    Condition: "TemplateEnabled"
  LambdaEdgeExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service:
                - "lambda.amazonaws.com"
                - "edgelambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyName: "LambdaEdgeExecutionRolePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  CookieSigningFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName:
        Fn::Sub: "${AWS::StackName}-cookie-signing"
      Code:
        S3Bucket:
          Ref: "ArtifactBucketName"
        S3Key:
          Fn::Join:
            - ""
            -
              -
                Ref: "ArtifactRootPrefix"
              - "wpsuite-site-guardian/functions/cookie-signing.zip"
      Handler: "lambda_function.lambda_handler"
      Description: "Lambda@Edge function for issuing CloudFront signed cookies with JWT authentication"
      Runtime: "python3.12"
      Timeout: 5
      MemorySize: 128
      Role:
        Fn::GetAtt:
          - "LambdaEdgeExecutionRole"
          - "Arn"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  LambdaCodeUpdater:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "LambdaCodeUpdate"
      FunctionName:
        Fn::Sub: "${AWS::StackName}-cookie-signing"
      DomainName:
        Ref: "DomainName"
      KeyPairId:
        Fn::GetAtt:
          - "CloudFrontPublicKey"
          - "PublicKeyId"
      CookieExpirationDays:
        Ref: "CookieExpirationDays"
      ProtectedPaths:
        Fn::Join:
          - ","
          -
            Ref: "ProtectedPaths"
      ProtectedPathGroupMap:
        Ref: "ProtectedPathGroupMap"
      PrivateKeyParameterName:
        Fn::If:
          - "ManageSigningKeyMaterial"
          -
            Fn::GetAtt:
              - "SigningKeyMaterial"
              - "PrivateKeyParameterName"
          -
            Fn::Sub: "/cloudfront/private-key/${KmsKeyId}"
      KmsKeyId:
        Fn::If:
          - "ManageSigningKeyMaterial"
          -
            Fn::GetAtt:
              - "SigningKeyMaterial"
              - "KmsKeyId"
          -
            Ref: "KmsKeyId"
      CognitoUserPoolId:
        Ref: "CognitoUserPoolId"
      CognitoAppClientIds:
        Fn::Join:
          - ","
          -
            Ref: "CognitoAppClientIds"
    DependsOn:
      - "CookieSigningFunction"
    Condition: "TemplateEnabled"
  CloudFrontDistributionUpdate:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "DistributionUpdate"
      DistributionId:
        Ref: "CloudFrontDistribution"
      ProtectedPaths:
        Fn::Join:
          - ","
          -
            Ref: "ProtectedPaths"
      ViewerRequestFunctionArn:
        Fn::GetAtt:
          - "ViewerRequestFunction"
          - "FunctionARN"
      PathRewriteFunctionArn:
        Fn::GetAtt:
          - "PathRewriteFunction"
          - "FunctionARN"
      NoCachePolicyId:
        Fn::GetAtt:
          - "NoCachePolicy"
          - "ResponseHeadersPolicyId"
      OriginAccessControlId:
        Fn::GetAtt:
          - "OriginAccessControl"
          - "OriginAccessControlId"
    Condition: "TemplateEnabled"
  CloudFrontDistribution:
    Type: "AWS::CloudFront::Distribution"
    Properties:
      DistributionConfig:
        Aliases:
          -
            Ref: "DomainName"
        Origins:
          -
            Id: "S3Origin"
            DomainName:
              Fn::GetAtt:
                - "StaticSiteBucket"
                - "RegionalDomainName"
            S3OriginConfig: {}
            OriginAccessControlId:
              Fn::GetAtt:
                - "OriginAccessControl"
                - "OriginAccessControlId"
        DefaultCacheBehavior:
          TargetOriginId: "S3Origin"
          ViewerProtocolPolicy: "redirect-to-https"
          CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
          OriginRequestPolicyId: "88a5eaf4-2fd4-4709-b370-b4c650ea3fcf"
          Compress: true
          FunctionAssociations:
            -
              EventType: "viewer-request"
              FunctionARN:
                Fn::GetAtt:
                  - "ViewerRequestFunction"
                  - "FunctionARN"
        CacheBehaviors:
          -
            PathPattern: "/issue-cookie*"
            TargetOriginId: "S3Origin"
            ViewerProtocolPolicy: "redirect-to-https"
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
            AllowedMethods:
              - "GET"
              - "HEAD"
            CachedMethods:
              - "GET"
              - "HEAD"
            Compress: false
            LambdaFunctionAssociations:
              -
                EventType: "viewer-request"
                LambdaFunctionARN:
                  Fn::GetAtt:
                    - "LambdaCodeUpdater"
                    - "VersionArn"
          -
            PathPattern: "/restricted*"
            TargetOriginId: "S3Origin"
            ViewerProtocolPolicy: "redirect-to-https"
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
            OriginRequestPolicyId: "88a5eaf4-2fd4-4709-b370-b4c650ea3fcf"
            ResponseHeadersPolicyId:
              Fn::GetAtt:
                - "NoCachePolicy"
                - "ResponseHeadersPolicyId"
            Compress: true
            TrustedKeyGroups:
              -
                Fn::GetAtt:
                  - "CloudFrontKeyGroup"
                  - "KeyGroupId"
            FunctionAssociations:
              -
                EventType: "viewer-request"
                FunctionARN:
                  Fn::GetAtt:
                    - "PathRewriteFunction"
                    - "FunctionARN"
        Enabled: true
        DefaultRootObject: "index.html"
        HttpVersion: "http2"
        PriceClass: "PriceClass_100"
        ViewerCertificate:
          AcmCertificateArn:
            Ref: "CertificateArn"
          SslSupportMethod: "sni-only"
          MinimumProtocolVersion: "TLSv1.2_2021"
        Logging:
          Fn::If:
            - "EnableLogging"
            -
              Bucket:
                Fn::GetAtt:
                  - "StaticSiteBucket"
                  - "DomainName"
              Prefix: "cloudfront-logs/"
              IncludeCookies: true
            -
              Ref: "AWS::NoValue"
        CustomErrorResponses:
          Fn::If:
            - "HasNotFoundPage"
            -
              Fn::If:
                - "HasForbiddenPage"
                -
                  -
                    ErrorCode: 404
                    ResponseCode: 404
                    ResponsePagePath:
                      Fn::Sub: "/${S3WWWRoot}${NotFoundPagePath}"
                    ErrorCachingMinTTL: 300
                  -
                    ErrorCode: 403
                    ResponseCode: 403
                    ResponsePagePath:
                      Fn::Sub: "/${S3WWWRoot}${ForbiddenPagePath}"
                    ErrorCachingMinTTL: 300
                -
                  -
                    ErrorCode: 404
                    ResponseCode: 404
                    ResponsePagePath:
                      Fn::Sub: "/${S3WWWRoot}${NotFoundPagePath}"
                    ErrorCachingMinTTL: 300
            -
              Fn::If:
                - "HasForbiddenPage"
                -
                  -
                    ErrorCode: 403
                    ResponseCode: 403
                    ResponsePagePath:
                      Fn::Sub: "/${S3WWWRoot}${ForbiddenPagePath}"
                    ErrorCachingMinTTL: 300
                -
                  Ref: "AWS::NoValue"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  StaticSiteBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket:
        Ref: "StaticSiteBucket"
      PolicyDocument:
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "cloudfront.amazonaws.com"
            Action:
              - "s3:GetObject"
              - "s3:ListBucket"
            Resource:
              -
                Fn::Sub: "arn:aws:s3:::${StaticSiteBucket}"
              -
                Fn::Sub: "arn:aws:s3:::${StaticSiteBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn:
                  Fn::Sub: "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
          -
            Effect: "Allow"
            Principal:
              Service: "delivery.logs.amazonaws.com"
            Action:
              - "s3:PutObject"
            Resource:
              Fn::Sub: "arn:aws:s3:::${StaticSiteBucket}/cloudfront-logs/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: "bucket-owner-full-control"
          -
            Effect: "Allow"
            Principal:
              Service: "delivery.logs.amazonaws.com"
            Action:
              - "s3:GetBucketAcl"
            Resource:
              Fn::Sub: "arn:aws:s3:::${StaticSiteBucket}"
    Condition: "TemplateEnabled"
  StaticSiteBucketCleaner:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "BucketCleaner"
      BucketName:
        Ref: "StaticSiteBucket"
    Condition: "TemplateEnabled"
  LicenseRefreshFunctionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyName: "LicenseRefreshFunctionRolePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "s3:PutObject"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:s3:::${StaticSiteBucket}/${S3WWWRoot}/wp-content/uploads/hub-for-wpsuiteio/*"
              -
                Effect: "Allow"
                Action:
                  - "ssm:GetParameter"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AppName}/site-guardian/site-key"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  LicenseRefreshFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName:
        Fn::Sub: "${AWS::StackName}-license-refresh"
      Code:
        S3Bucket:
          Ref: "ArtifactBucketName"
        S3Key:
          Fn::Join:
            - ""
            -
              -
                Ref: "ArtifactRootPrefix"
              - "wpsuite-site-guardian/functions/license-refresh.zip"
      Handler: "license_refresher.lambda_handler"
      Description: "Refreshes config.enc and lic.jws in the site bucket from the WP Suite API."
      Runtime: "python3.12"
      Timeout: 30
      MemorySize: 256
      Role:
        Fn::GetAtt:
          - "LicenseRefreshFunctionRole"
          - "Arn"
      Environment:
        Variables:
          WPSUITE_MARKETPLACE_DEPLOYMENT_PRODUCT_CODE: "5d8wq5hg1d54kb933ntenntiu"
          AWS_SDK_UA_APP_ID: "APN_1.1/pc_5d8wq5hg1d54kb933ntenntiu$"
          SITE_BUCKET_NAME:
            Ref: "StaticSiteBucket"
          SITE_WWWROOT:
            Ref: "S3WWWRoot"
          WPSUITE_ACCOUNT_ID:
            Ref: "WpsuiteAccountId"
          WPSUITE_SITE_ID:
            Ref: "WpsuiteSiteId"
          WPSUITE_API_BASE_URL:
            Ref: "WpsuiteApiBaseUrl"
          SITE_KEY_PARAMETER_NAME:
            Fn::Sub: "/${AppName}/site-guardian/site-key"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "LicenseRefreshFunctionTemplateEnabledCondition"
  LicenseRefreshFunctionLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName:
        Fn::Sub: "/aws/lambda/${AWS::StackName}-license-refresh"
      RetentionInDays:
        Ref: "LogRetentionDays"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "LicenseRefreshFunctionLogGroupTemplateEnabledCondition"
  LicenseRefreshSchedule:
    Type: "AWS::Events::Rule"
    Properties:
      Description: "Weekly WP Suite site config refresh schedule"
      ScheduleExpression:
        Ref: "LicenseRefreshScheduleExpression"
      State: "ENABLED"
      Targets:
        -
          Arn:
            Fn::GetAtt:
              - "LicenseRefreshFunction"
              - "Arn"
          Id: "LicenseRefreshFunctionTarget"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "LicenseRefreshScheduleTemplateEnabledCondition"
  LicenseRefreshPermission:
    Type: "AWS::Lambda::Permission"
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName:
        Ref: "LicenseRefreshFunction"
      Principal: "events.amazonaws.com"
      SourceArn:
        Fn::GetAtt:
          - "LicenseRefreshSchedule"
          - "Arn"
    Condition: "LicenseRefreshPermissionTemplateEnabledCondition"
  HostedZoneLookup:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CloudFrontResourceManager"
          - "Arn"
      ResourceType: "HostedZoneLookup"
      DomainName:
        Ref: "DomainName"
    Condition: "HostedZoneLookupTemplateEnabledCondition"
  WWWDNSRecord:
    Type: "AWS::Route53::RecordSet"
    Properties:
      HostedZoneId:
        Fn::GetAtt:
          - "HostedZoneLookup"
          - "HostedZoneId"
      Name:
        Fn::Sub: "www.${DomainName}"
      Type: "A"
      AliasTarget:
        DNSName:
          Fn::GetAtt:
            - "CloudFrontDistribution"
            - "DomainName"
        HostedZoneId: "Z2FDTNDATAQYW2"
    Condition: "WWWDNSRecordTemplateEnabledCondition"
  ApexDNSRecord:
    Type: "AWS::Route53::RecordSet"
    Properties:
      HostedZoneId:
        Fn::GetAtt:
          - "HostedZoneLookup"
          - "HostedZoneId"
      Name:
        Ref: "DomainName"
      Type: "A"
      AliasTarget:
        DNSName:
          Fn::GetAtt:
            - "CloudFrontDistribution"
            - "DomainName"
        HostedZoneId: "Z2FDTNDATAQYW2"
    Condition: "ApexDNSRecordTemplateEnabledCondition"
  MonitoringDashboard:
    Type: "AWS::CloudWatch::Dashboard"
    Properties:
      DashboardName:
        Fn::Sub: "${AWS::StackName}-monitoring"
      DashboardBody:
        Fn::Sub: "{\n  \"widgets\": [\n    {\n      \"type\": \"metric\",\n      \"x\": 0,\n      \"y\": 0,\n      \"width\": 12,\n      \"height\": 6,\n      \"properties\": {\n        \"metrics\": [\n          [\n            \"AWS/Lambda\",\n            \"Invocations\",\n            \"FunctionName\",\n            \"${CookieSigningFunction}\"\n          ],\n          [\n            \".\",\n            \"Errors\",\n            \".\",\n            \".\"\n          ],\n          [\n            \".\",\n            \"Duration\",\n            \".\",\n            \".\"\n          ]\n        ],\n        \"period\": 300,\n        \"stat\": \"Sum\",\n        \"region\": \"us-east-1\",\n        \"title\": \"Lambda@Edge Function Metrics (us-east-1)\"\n      }\n    },\n    {\n      \"type\": \"metric\",\n      \"x\": 12,\n      \"y\": 0,\n      \"width\": 12,\n      \"height\": 6,\n      \"properties\": {\n        \"metrics\": [\n          [\n            \"AWS/CloudFront\",\n            \"Requests\",\n            \"DistributionId\",\n            \"${CloudFrontDistribution}\"\n          ],\n          [\n            \".\",\n            \"BytesDownloaded\",\n            \".\",\n            \".\"\n          ],\n          [\n            \".\",\n            \"4xxErrorRate\",\n            \".\",\n            \".\"\n          ],\n          [\n            \".\",\n            \"5xxErrorRate\",\n            \".\",\n            \".\"\n          ]\n        ],\n        \"period\": 300,\n        \"stat\": \"Sum\",\n        \"region\": \"${AWS::Region}\",\n        \"title\": \"CloudFront Distribution Metrics\"\n      }\n    },\n    {\n      \"type\": \"log\",\n      \"x\": 0,\n      \"y\": 6,\n      \"width\": 24,\n      \"height\": 6,\n      \"properties\": {\n        \"query\": \"SOURCE '/aws/lambda/us-east-1.${CookieSigningFunction}'\\n| fields @timestamp, @message\\n| filter @message like /ERROR/\\n| sort @timestamp desc\\n| limit 100\",\n        \"region\": \"us-east-1\",\n        \"title\": \"Lambda@Edge Error Logs\",\n        \"view\": \"table\"\n      }\n    }\n  ]\n}"
    Condition: "MonitoringDashboardTemplateEnabledCondition"
Outputs:
  PrmProductCode:
    Description: "AWS Marketplace product code used for WP Suite Deployment Access PRM attribution."
    Value:
      Fn::FindInMap:
        - "WpSuiteMarketplace"
        - "DeploymentAccess"
        - "ProductCode"
  TemplateFamily:
    Description: "Template family identifier."
    Value: "wpsuite-static-site-guardian"
  TemplateVersion:
    Description: "Template version used for this nested stack."
    Value:
      Ref: "TemplateVersion"
  S3BucketName:
    Description: "S3 Bucket name for static site hosting."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Ref: "StaticSiteBucket"
        - ""
  S3BucketUrl:
    Description: "S3 Bucket URL for static site hosting."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::Sub: "https://${StaticSiteBucket}.s3.${AWS::Region}.amazonaws.com"
        - ""
  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Ref: "CloudFrontDistribution"
        - ""
  CloudFrontDistributionDomain:
    Description: "CloudFront Distribution Domain Name."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::GetAtt:
            - "CloudFrontDistribution"
            - "DomainName"
        - ""
  LambdaEdgeFunctionArn:
    Description: "Lambda@Edge Function ARN."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::GetAtt:
            - "LambdaCodeUpdater"
            - "VersionArn"
        - ""
  CloudFrontKeyGroupId:
    Description: "CloudFront Key Group ID for signed cookies."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::GetAtt:
            - "CloudFrontKeyGroup"
            - "KeyGroupId"
        - ""
  ResolvedKmsKeyId:
    Description: "Resolved KMS key ID."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::If:
            - "ManageSigningKeyMaterial"
            -
              Fn::GetAtt:
                - "SigningKeyMaterial"
                - "KmsKeyId"
            -
              Ref: "KmsKeyId"
        - ""
  PrivateKeyParameterName:
    Description: "SSM parameter name that stores the private signing key."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::If:
            - "ManageSigningKeyMaterial"
            -
              Fn::GetAtt:
                - "SigningKeyMaterial"
                - "PrivateKeyParameterName"
            -
              Fn::Sub: "/cloudfront/private-key/${KmsKeyId}"
        - ""
  NoCachePolicyId:
    Description: "CloudFront Response Headers Policy ID."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::GetAtt:
            - "NoCachePolicy"
            - "ResponseHeadersPolicyId"
        - ""
  Route53HostedZoneId:
    Description: "Route53 Hosted Zone ID for the domain."
    Value:
      Fn::GetAtt:
        - "HostedZoneLookup"
        - "HostedZoneId"
    Condition: "OutputRoute53HostedZoneIdTemplateEnabledCondition"
  SetupInstructions:
    Description: "Next steps to complete the setup."
    Value:
      Fn::If:
        - "TemplateEnabled"
        -
          Fn::Sub: "1. Upload your static WordPress files to S3 bucket: ${StaticSiteBucket}/${S3WWWRoot}\n2. Include custom error pages (if configured): ${NotFoundPagePath} and ${ForbiddenPagePath}\n3. DNS Configuration: Check CreateDNSRecords parameter (${CreateDNSRecords})\n4. Configure Cognito User Pool and App Clients for JWT authentication\n5. Test cookie issuance via main domain: https://${DomainName}/issue-cookie?action=signin\n6. Verify protected paths redirect unauthenticated users to ${SigninPagePath}\n7. Test error pages by accessing non-existent URLs\n8. If weekly refresh is enabled, confirm config.enc and lic.jws appear under ${S3WWWRoot}/wp-content/uploads/hub-for-wpsuiteio/\n\nS3 Bucket: ${StaticSiteBucket}\nS3 WWWRoot Prefix: ${S3WWWRoot}\nCloudFront Domain: ${CloudFrontDistribution.DomainName}\nCookie Endpoint: https://${DomainName}/issue-cookie\nAuthentication: JWT Bearer token required for cookie issuance"
        - ""
  SiteKeyParameterName:
    Description: "SSM SecureString parameter that stores the WP Suite site key."
    Value:
      Fn::Sub: "/${AppName}/site-guardian/site-key"
    Condition: "OutputSiteKeyParameterNameTemplateEnabledCondition"
  LicenseRefreshFunctionArn:
    Description: "Lambda ARN of the scheduled WP Suite license refresher."
    Value:
      Fn::GetAtt:
        - "LicenseRefreshFunction"
        - "Arn"
    Condition: "OutputLicenseRefreshFunctionArnTemplateEnabledCondition"
  MonitoringDashboardUrl:
    Description: "CloudWatch Dashboard URL for monitoring."
    Value:
      Fn::Sub: "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${AWS::StackName}-monitoring"
    Condition: "OutputMonitoringDashboardUrlTemplateEnabledCondition"
