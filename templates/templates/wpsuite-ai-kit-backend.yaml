AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite AI Kit backend nested template for Marketplace Deployment Access"
Parameters:
  PrmTagValue:
    Type: "String"
    Default: "pc:5d8wq5hg1d54kb933ntenntiu"
    AllowedPattern: "^pc:[a-z0-9]+$"
    Description: "AWS Partner Revenue Measurement tag value for WP Suite Deployment Access resources."
  Enabled:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create AI Kit backend resources in this nested stack."
  TemplateVersion:
    Type: "String"
    Default: "v1.0.34"
    Description: "Immutable WP Suite deployment template version."
  ArtifactRootPrefix:
    Type: "String"
    Description: "Buyer-owned S3 prefix containing staged WP Suite artifacts."
  ArtifactBucketName:
    Type: "String"
    Default: "wpsuite-artifacts"
    Description: "S3 bucket that stores the published deployment artifacts for this application."
  AppName:
    Type: "String"
    Default: "wpsuite-ai-kit"
    AllowedPattern: "^[a-zA-Z0-9-]+$"
    ConstraintDescription: "Must contain only alphanumeric characters and hyphens"
    Description: "Application name for resource naming"
  Environment:
    Type: "String"
    Default: "prod"
    AllowedValues:
      - "dev"
      - "staging"
      - "prod"
    Description: "Deployment environment"
  UseLegacyCustomResourceManagerName:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Keep legacy custom-resource-manager naming for update-safe ServiceToken stability."
  DocsBucketName:
    Type: "String"
    Default: ""
    Description: "Optional existing S3 bucket name for knowledge base documents. Leave empty to create a new bucket."
  InclusionPrefix:
    Type: "String"
    Default: "documents/"
    Description: "S3 prefix to include in Knowledge Base and trigger automatic sync."
  TempAssetsPrefix:
    Type: "String"
    Default: "temp-assets/"
    Description: "S3 prefix for temporary asset uploads."
  ConfigPrefix:
    Type: "String"
    Default: "config/"
    Description: "S3 prefix for metadata configuration files and prompt templates."
  FlowAttachmentBucketName:
    Type: "String"
    Default: ""
    Description: "Optional Flow payload bucket name that stores workflow attachment objects for AI consumption."
  FlowAttachmentPrefix:
    Type: "String"
    Default: ""
    Description: "Optional Flow payload prefix used to resolve attachment uris inside the Flow payload bucket."
  FrontendModelId:
    Type: "String"
    Default: "amazon.nova-lite-v1:0"
    Description: "Bedrock model for frontend endpoints."
  ModelId:
    Type: "String"
    Default: "amazon.nova-lite-v1:0"
    Description: "Bedrock model for admin endpoints."
  AgentModelId:
    Type: "String"
    Default: "global.amazon.nova-2-lite-v1:0"
    Description: "Bedrock model for agent workflow paths."
  AgentReasoningEffortLevel:
    Type: "String"
    Default: ""
    Description: "Optional reasoning level for chatbot agent mode."
  AgentTools:
    Type: "String"
    Default: ""
    Description: "Optional comma-separated tools enabled for chatbot agent mode."
  AgentToolInvocationPolicy:
    Type: "String"
    Default: "auto"
    Description: "Tool invocation policy for chatbot agent mode."
  WorkMailOrganizationId:
    Type: "String"
    Default: ""
    Description: "Amazon WorkMail organization ID allowed to invoke inbound email intake."
  EmailIntakeSesBucketName:
    Type: "String"
    Default: ""
    Description: "Optional SES raw-email S3 bucket name."
  EmailIntakeSesPrefix:
    Type: "String"
    Default: ""
    Description: "Optional SES raw-email S3 prefix."
  EmailIntakeAccountId:
    Type: "String"
    Default: ""
    Description: "Flow accountId to place on normalized inbound email events."
  EmailIntakeSiteId:
    Type: "String"
    Default: ""
    Description: "Flow siteId to place on normalized inbound email events."
  EmailIntakeFormId:
    Type: "String"
    Default: "email-intake"
    Description: "Flow formId to place on normalized inbound email events."
  EmailIntakeStatus:
    Type: "String"
    Default: "received"
    Description: "Submission-like status to place on normalized inbound email events."
  EmailIntakeActionKey:
    Type: "String"
    Default: "email-intake"
    Description: "Action key to place on normalized inbound email events."
  EmailIntakeEventSource:
    Type: "String"
    Default: "wpsuite.ai-kit"
    Description: "EventBridge source for normalized inbound email events."
  EmailIntakeOutputDetailType:
    Type: "String"
    Default: "submission.created"
    Description: "EventBridge detail-type emitted after AI extraction."
  InquiryFieldNames:
    Type: "String"
    Default: "email,fullName,subject,message,requestSummary,requestedAction,intent,language,company,phone,sourceSystem,sourceChannel,messageId,organizationId,recipients,attachments"
    Description: "Comma-separated list of canonical inquiry field names."
  KnowledgeBaseId:
    Type: "String"
    Default: ""
    Description: "Existing Bedrock Knowledge Base ID. Leave empty to create a new one."
  BedrockGuardrailId:
    Type: "String"
    Default: ""
    Description: "AWS Bedrock Guardrail ID."
  BedrockGuardrailVersion:
    Type: "String"
    Default: "DRAFT"
    Description: "AWS Bedrock Guardrail version."
  RecaptchaProjectId:
    Type: "String"
    Default: ""
    Description: "Google Cloud Project ID for reCAPTCHA Enterprise."
  RecaptchaSiteKey:
    Type: "String"
    Default: ""
    Description: "reCAPTCHA site key."
  SharedRecaptchaSecretParameterName:
    Type: "String"
    Default: ""
    Description: "Deployment-wide reCAPTCHA secret SSM parameter name created by the Cognito nested stack."
  ApiCustomDomainName:
    Type: "String"
    Default: ""
    Description: "Custom domain name for API."
  AcmCertificateArn:
    Type: "String"
    Default: ""
    Description: "ACM certificate ARN for custom domain."
  Route53HostedZoneId:
    Type: "String"
    Default: ""
    Description: "Route53 hosted zone ID."
  AdminCognitoUserPoolId:
    Type: "String"
    Default: ""
    Description: "Cognito User Pool ID for admin COGNITO auth mode."
  FrontendCognitoUserPoolId:
    Type: "String"
    Default: ""
    Description: "Cognito User Pool ID for frontend COGNITO auth mode."
  ProductionLogLevel:
    Type: "String"
    Default: "INFO"
    Description: "Production log level."
  SharedRecaptchaSecretParameterArn:
    Type: "String"
    Default: ""
    AllowedPattern: "^$|arn:[a-zA-Z0-9-]+:[a-zA-Z0-9-]+:[a-z0-9-]*:[0-9]{12}:.+$"
    Description: "Deployment-wide reCAPTCHA secret SSM parameter ARN created by the Cognito nested stack."
  SharedRecaptchaKmsKeyArn:
    Type: "String"
    Default: ""
    AllowedPattern: "^$|arn:[a-zA-Z0-9-]+:[a-zA-Z0-9-]+:[a-z0-9-]*:[0-9]{12}:.+$"
    Description: "Deployment-wide reCAPTCHA secret KMS key ARN created by the Cognito nested stack."
  RecaptchaSecretKey:
    Type: "String"
    Default: ""
    Description: "Google reCAPTCHA secret."
    NoEcho: true
  AlertEmailAddress1:
    Type: "String"
    Default: ""
    Description: "Email recipient 1 for SNS critical alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress2:
    Type: "String"
    Default: ""
    Description: "Email recipient 2 for SNS critical alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress3:
    Type: "String"
    Default: ""
    Description: "Email recipient 3 for SNS critical alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress4:
    Type: "String"
    Default: ""
    Description: "Email recipient 4 for SNS critical alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  AlertEmailAddress5:
    Type: "String"
    Default: ""
    Description: "Email recipient 5 for SNS critical alerts. Confirm from the buyer SNS console to require authenticated unsubscribe."
  EnableRerank:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable semantic reranking."
  StrictMetadataFiltering:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable strict metadata filtering."
  StrictKBGroundingForChat:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Require chat answers to be grounded in KB snippets."
  EnableAgentModeForChatbot:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Use the agent model path for chatbot requests."
  CreateS3Trigger:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable automatic knowledge base sync on S3 document changes."
  GuardrailsEnabled:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable or disable content guardrails."
  EnableSummarizerBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable frontend API endpoint for text summarization."
  EnableChatbotBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable frontend API endpoint for chatbot functionality."
  EnableLanguageAIBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable frontend writing assistant endpoints."
  EnableRecaptcha:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable Google reCAPTCHA protection for frontend APIs."
  EnableRoute53:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable automatic Route53 DNS configuration for custom domain."
  EnableAlerts:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable SNS topic creation for critical alerts. Confirm pending subscriptions from the buyer SNS console by pasting the email confirmation URL; do not open the email link directly."
  EnableWAF:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable AWS WAF protection for API endpoints."
  FrontendApiAuthMode:
    Type: "String"
    Default: "NONE"
    AllowedValues:
      - "NONE"
      - "IAM"
      - "COGNITO"
    Description: "Authentication mode for frontend APIs."
  AdminApiAuthMode:
    Type: "String"
    Default: "IAM"
    AllowedValues:
      - "NONE"
      - "IAM"
      - "COGNITO"
    Description: "Authentication mode for admin APIs."
  RecaptchaMode:
    Type: "String"
    Default: "enterprise"
    AllowedValues:
      - "enterprise"
      - "classic"
    Description: "Verification mode used when reCAPTCHA is enabled."
  AdminCognitoAuthScopes:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "Optional OAuth scopes for admin Cognito authorization."
  FrontendCognitoAuthScopes:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "Optional OAuth scopes for frontend Cognito authorization."
  PublicAllowedIPs:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "CIDR ranges allowed for public endpoints."
  AdminAllowedIPs:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "CIDR ranges allowed for admin endpoints."
  BlockedIPs:
    Type: "CommaDelimitedList"
    Default: ""
    Description: "CIDR ranges to block for all endpoints."
  MaxTokens:
    Type: "Number"
    Default: 300
    Description: "Maximum number of tokens generated by the model."
  OverlapPercentage:
    Type: "Number"
    Default: 20
    Description: "Chunk overlap percentage for knowledge base ingestion."
  SessionTTLDays:
    Type: "Number"
    Default: 1
    Description: "Days to retain chat sessions and messages."
  RecaptchaChatTtlSeconds:
    Type: "Number"
    Default: 120
    Description: "reCAPTCHA verification cache TTL for chat sessions."
  RecaptchaScoreThreshold:
    Type: "Number"
    Default: 0.5
    Description: "Minimum reCAPTCHA score threshold."
  LambdaMemorySize:
    Type: "Number"
    Default: 2048
    Description: "Lambda function memory size in MB."
  LambdaTimeout:
    Type: "Number"
    Default: 30
    Description: "Lambda function timeout in seconds."
  AiHandlerTimeout:
    Type: "Number"
    Default: 30
    Description: "Timeout for the ai-handler Lambda."
  AiAgentDispatcherTimeout:
    Type: "Number"
    Default: 30
    Description: "Timeout for the ai-agent-dispatcher Lambda."
  FrontendApiBurstLimit:
    Type: "Number"
    Default: 1000
    Description: "API Gateway burst limit for frontend endpoints."
  FrontendApiRateLimit:
    Type: "Number"
    Default: 500
    Description: "API Gateway rate limit for frontend endpoints."
  AdminApiBurstLimit:
    Type: "Number"
    Default: 0
    Description: "API Gateway burst limit for admin endpoints."
  AdminApiRateLimit:
    Type: "Number"
    Default: 0
    Description: "API Gateway rate limit for admin endpoints."
  ApiSchemaVersion:
    Type: "Number"
    Default: 3
    Description: "API schema version number."
  LogRetentionDays:
    Type: "Number"
    Default: 14
    Description: "CloudWatch Logs retention in days."
Mappings:
  WpSuiteMarketplace:
    DeploymentAccess:
      ProductCode: "5d8wq5hg1d54kb933ntenntiu"
Conditions:
  TemplateEnabled:
    Fn::Equals:
      -
        Ref: "Enabled"
      - "true"
  UseCustomDomain:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "ApiCustomDomainName"
          - ""
  UseRoute53:
    Fn::And:
      -
        Condition: "UseCustomDomain"
      -
        Fn::Equals:
          -
            Ref: "EnableRoute53"
          - "true"
  UseProvidedHostedZoneId:
    Fn::And:
      -
        Condition: "UseRoute53"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Ref: "Route53HostedZoneId"
              - ""
  UseProvidedDocsBucket:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "DocsBucketName"
          - ""
  CreateNewDocsBucket:
    Fn::Equals:
      -
        Ref: "DocsBucketName"
      - ""
  CreateNewKnowledgeBase:
    Fn::Equals:
      -
        Ref: "KnowledgeBaseId"
      - ""
  UseProvidedKnowledgeBase:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "KnowledgeBaseId"
          - ""
  HasWorkMailOrganizationId:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "WorkMailOrganizationId"
          - ""
  HasEmailIntakeSesBucketName:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "EmailIntakeSesBucketName"
          - ""
  HasEmailIntakeSesPrefix:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "EmailIntakeSesPrefix"
          - ""
  HasEmailIntakeSesAccessConfig:
    Fn::And:
      -
        Condition: "HasEmailIntakeSesBucketName"
      -
        Condition: "HasEmailIntakeSesPrefix"
  HasFlowAttachmentBucketName:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "FlowAttachmentBucketName"
          - ""
  HasFlowAttachmentPrefix:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "FlowAttachmentPrefix"
          - ""
  HasFlowAttachmentAccessConfig:
    Fn::And:
      -
        Condition: "HasFlowAttachmentBucketName"
      -
        Condition: "HasFlowAttachmentPrefix"
  S3TriggerEnabled:
    Fn::Equals:
      -
        Ref: "CreateS3Trigger"
      - "true"
  UseAdminCognito:
    Fn::Equals:
      -
        Ref: "AdminApiAuthMode"
      - "COGNITO"
  HasAdminCognitoScopes:
    Fn::Not:
      -
        Fn::Equals:
          -
            Fn::Join:
              - ""
              -
                Ref: "AdminCognitoAuthScopes"
          - ""
  UseFrontendCognito:
    Fn::Equals:
      -
        Ref: "FrontendApiAuthMode"
      - "COGNITO"
  HasFrontendCognitoScopes:
    Fn::Not:
      -
        Fn::Equals:
          -
            Fn::Join:
              - ""
              -
                Ref: "FrontendCognitoAuthScopes"
          - ""
  EnableRecaptchaProtection:
    Fn::Equals:
      -
        Ref: "EnableRecaptcha"
      - "true"
  UseSharedRecaptchaSecret:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "SharedRecaptchaSecretParameterName"
          - ""
  HasLocalRecaptchaSecret:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "RecaptchaSecretKey"
          - ""
  CreateLocalRecaptchaSecret:
    Fn::And:
      -
        Condition: "EnableRecaptchaProtection"
      -
        Fn::Not:
          -
            Condition: "UseSharedRecaptchaSecret"
      -
        Condition: "HasLocalRecaptchaSecret"
  RecaptchaKmsAccessRequired:
    Fn::And:
      -
        Condition: "EnableRecaptchaProtection"
      -
        Fn::Or:
          -
            Condition: "UseSharedRecaptchaSecret"
          -
            Condition: "CreateLocalRecaptchaSecret"
  IsProduction:
    Fn::Equals:
      -
        Ref: "Environment"
      - "prod"
  UseLegacyCustomResourceManagerNaming:
    Fn::Equals:
      -
        Ref: "UseLegacyCustomResourceManagerName"
      - "true"
  AlertsEnabled:
    Fn::Equals:
      -
        Ref: "EnableAlerts"
      - "true"
  HasAlertEmailAddress1:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress1"
          - ""
  AlertEmailAddress1Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress1"
  HasAlertEmailAddress2:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress2"
          - ""
  AlertEmailAddress2Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress2"
  HasAlertEmailAddress3:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress3"
          - ""
  AlertEmailAddress3Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress3"
  HasAlertEmailAddress4:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress4"
          - ""
  AlertEmailAddress4Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress4"
  HasAlertEmailAddress5:
    Fn::Not:
      -
        Fn::Equals:
          -
            Ref: "AlertEmailAddress5"
          - ""
  AlertEmailAddress5Enabled:
    Fn::And:
      -
        Condition: "AlertsEnabled"
      -
        Condition: "HasAlertEmailAddress5"
  WAFEnabled:
    Fn::Equals:
      -
        Ref: "EnableWAF"
      - "true"
  HasPublicAllowedIPs:
    Fn::And:
      -
        Condition: "WAFEnabled"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Fn::Join:
                  - ""
                  -
                    Ref: "PublicAllowedIPs"
              - ""
  HasAdminAllowedIPs:
    Fn::And:
      -
        Condition: "WAFEnabled"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Fn::Join:
                  - ""
                  -
                    Ref: "AdminAllowedIPs"
              - ""
  HasBlockedIPs:
    Fn::And:
      -
        Condition: "WAFEnabled"
      -
        Fn::Not:
          -
            Fn::Equals:
              -
                Fn::Join:
                  - ""
                  -
                    Ref: "BlockedIPs"
              - ""
  HasFrontendThrottling:
    Fn::Not:
      -
        Fn::And:
          -
            Fn::Equals:
              -
                Ref: "FrontendApiBurstLimit"
              - "0"
          -
            Fn::Equals:
              -
                Ref: "FrontendApiRateLimit"
              - "0"
  HasAdminThrottling:
    Fn::Not:
      -
        Fn::And:
          -
            Fn::Equals:
              -
                Ref: "AdminApiBurstLimit"
              - "0"
          -
            Fn::Equals:
              -
                Ref: "AdminApiRateLimit"
              - "0"
  S3TriggerEnabledWithNewBucket:
    Fn::And:
      -
        Condition: "S3TriggerEnabled"
      -
        Condition: "CreateNewDocsBucket"
  S3TriggerEnabledWithProvidedBucket:
    Fn::And:
      -
        Condition: "S3TriggerEnabled"
      -
        Condition: "UseProvidedDocsBucket"
  HasSummarizerBackendEnabled:
    Fn::Equals:
      -
        Ref: "EnableSummarizerBackend"
      - "true"
  HasChatbotBackendEnabled:
    Fn::Equals:
      -
        Ref: "EnableChatbotBackend"
      - "true"
  HasLanguageAIBackendEnabled:
    Fn::Equals:
      -
        Ref: "EnableLanguageAIBackend"
      - "true"
  HasAnyFrontend:
    Fn::Or:
      -
        Condition: "HasSummarizerBackendEnabled"
      -
        Condition: "HasChatbotBackendEnabled"
      -
        Condition: "HasLanguageAIBackendEnabled"
  RecaptchaKmsKeyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateLocalRecaptchaSecret"
  RecaptchaKmsKeyAliasTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateLocalRecaptchaSecret"
  FrontendCognitoAuthTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseFrontendCognito"
  AdminCognitoAuthTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseAdminCognito"
  ApiMethodSettingsTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasAnyFrontend"
  AiHandlerInvokePermissionFrontendTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasChatbotBackendEnabled"
  ApiDomainNameTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseCustomDomain"
  ApiBasePathMappingTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseCustomDomain"
  PublicAllowedIPSetTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasPublicAllowedIPs"
  AdminAllowedIPSetTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasAdminAllowedIPs"
  BlockedIPSetTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasBlockedIPs"
  WebACLTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "WAFEnabled"
  WebACLAssociationTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "WAFEnabled"
  DocsBucketTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateNewDocsBucket"
  DocsBucketCleanerTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateNewDocsBucket"
  KnowledgeBaseTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateNewKnowledgeBase"
  KnowledgeBaseDataSourceTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateNewKnowledgeBase"
  KnowledgeBaseBootstrapTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateNewKnowledgeBase"
  KBSyncStateTableTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "S3TriggerEnabled"
  RecaptchaSecretParameterTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateLocalRecaptchaSecret"
  AiHandlerFunctionSharedRecaptchaKmsPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "UseSharedRecaptchaSecret"
  AiHandlerFunctionLocalRecaptchaKmsPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "CreateLocalRecaptchaSecret"
  AiEmailIntakeSesBucketAccessPolicyTemplateEnabledCondition:
    Fn::And:
      -
        Condition: "TemplateEnabled"
      -
        Condition: "HasEmailIntakeSesAccessConfig"
  AiEmailIntakeFlowAttachmentAccessPolicyTemplateEnabledCondition:
