    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        -
          PolicyName: "AiHandlerFunctionRolePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "bedrock:InvokeModel"
                  - "bedrock:GetFoundationModel"
                  - "bedrock:GetInferenceProfile"
                Resource:
                  -
                    Fn::Sub: "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
                  -
                    Fn::Sub: "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*"
              -
                Effect: "Allow"
                Action:
                  - "bedrock:Retrieve"
                  - "bedrock:RetrieveAndGenerate"
                  - "bedrock:GetIngestionJob"
                  - "bedrock:ListIngestionJobs"
                Resource:
                  Fn::If:
                    - "UseProvidedKnowledgeBase"
                    -
                      Fn::Sub: "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/${KnowledgeBaseId}"
                    -
                      Fn::GetAtt:
                        - "KnowledgeBase"
                        - "KnowledgeBaseArn"
              -
                Effect: "Allow"
                Action:
                  - "bedrock:ListKnowledgeBases"
                  - "translate:TranslateText"
                  - "comprehend:DetectDominantLanguage"
                  - "aws-marketplace:ViewSubscriptions"
                  - "aws-marketplace:Subscribe"
                  - "cloudwatch:PutMetricData"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "bedrock:ApplyGuardrail"
                Resource: "*"
              -
                Effect: "Allow"
                Action:
                  - "s3:ListBucket"
                Resource:
                  Fn::If:
                    - "UseProvidedDocsBucket"
                    -
                      Fn::Sub: "arn:${AWS::Partition}:s3:::${DocsBucketName}"
                    -
                      Fn::GetAtt:
                        - "DocsBucket"
                        - "Arn"
              -
                Effect: "Allow"
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                Resource:
                  Fn::If:
                    - "UseProvidedDocsBucket"
                    -
                      Fn::Sub: "arn:${AWS::Partition}:s3:::${DocsBucketName}/*"
                    -
                      Fn::Sub: "${DocsBucket.Arn}/*"
              -
                Effect: "Allow"
                Action:
                  - "dynamodb:GetItem"
                  - "dynamodb:PutItem"
                  - "dynamodb:UpdateItem"
                  - "dynamodb:Query"
                Resource:
                  -
                    Fn::GetAtt:
                      - "ChatSessionsTable"
                      - "Arn"
                  -
                    Fn::GetAtt:
                      - "ChatMessagesTable"
                      - "Arn"
              -
                Effect: "Allow"
                Action:
                  - "ssm:GetParameter"
                  - "ssm:GetParameters"
                  - "ssm:PutParameter"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AppName}/*"
              -
                Fn::If:
                  - "UseSharedRecaptchaSecret"
                  -
                    Effect: "Allow"
                    Action:
                      - "ssm:GetParameter"
                    Resource:
                      Ref: "SharedRecaptchaSecretParameterArn"
                  -
                    Ref: "AWS::NoValue"
              -
                Effect: "Allow"
                Action:
                  - "lambda:InvokeFunction"
                Resource:
                  Fn::Sub: "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AppName}-kb-sync"
              -
                Effect: "Allow"
                Action:
                  - "sqs:SendMessage"
                Resource:
                  Fn::GetAtt:
                    - "DeadLetterQueue"
                    - "Arn"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
