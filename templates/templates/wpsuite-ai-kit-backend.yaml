  DeadLetterQueue:
    Type: "AWS::SQS::Queue"
    Properties:
      QueueName:
        Fn::Sub: "${AppName}-dlq"
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 60
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
