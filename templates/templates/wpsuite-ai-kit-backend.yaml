    Type: "AWS::CloudWatch::Alarm"
    Properties:
      AlarmName:
        Fn::Sub: "${AppName}-dlq-messages"
      AlarmDescription:
        Fn::Sub: "${AppName} AI Kit dead-letter queue contains messages."
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        -
          Name: "QueueName"
          Value:
            Fn::GetAtt:
              - "DeadLetterQueue"
              - "QueueName"
      Statistic: "Sum"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: "GreaterThanThreshold"
      TreatMissingData: "notBreaching"
      AlarmActions:
        -
          Ref: "AlertsTopic"
    Condition: "DeadLetterQueueMessagesAlarmTemplateEnabledCondition"
