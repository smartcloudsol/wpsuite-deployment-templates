    Type: "Custom::ApiAuthorizer"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CustomResourceManager"
          - "Arn"
      Name:
        Fn::Sub: "${AppName}-admin-cognito-auth"
      Type: "COGNITO_USER_POOLS"
      RestApiId:
        Ref: "RestApi"
      IdentitySource: "method.request.header.Authorization"
      ProviderARNs:
        -
          Fn::Sub: "arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${AdminCognitoUserPoolId}"
      AuthorizerResultTtlInSeconds: 300
    Condition: "AdminCognitoAuthTemplateEnabledCondition"
  ApiAuthorizerAttachment:
    Type: "Custom::ApiAuthorizerAttachment"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CustomResourceManager"
          - "Arn"
      RestApiId:
        Ref: "RestApi"
      AdminAuthMode:
        Ref: "AdminApiAuthMode"
      AdminAuthorizerId:
        Fn::If:
          - "UseAdminCognito"
          -
            Ref: "AdminCognitoAuth"
          - ""
      AdminAuthorizationScopes:
        Fn::If:
          - "HasAdminCognitoScopes"
          -
            Fn::Join:
              - ","
              -
                Ref: "AdminCognitoAuthScopes"
          - ""
      FrontendAuthMode:
        Ref: "FrontendApiAuthMode"
      FrontendAuthorizerId:
        Fn::If:
          - "UseFrontendCognito"
          -
            Ref: "FrontendCognitoAuth"
          - ""
      FrontendAuthorizationScopes:
        Fn::If:
