Resources:
  AiHandlerFunctionLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName:
        Fn::Sub: "/aws/lambda/${AppName}-ai-handler"
      RetentionInDays:
        Ref: "LogRetentionDays"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  RestApiLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName:
        Fn::Sub: "/aws/apigateway/${AppName}-rest-api"
      RetentionInDays:
        Ref: "LogRetentionDays"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  RestApiExecutionLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName:
        Fn::Sub: "API-Gateway-Execution-Logs_${RestApi}/prod"
      RetentionInDays:
        Ref: "LogRetentionDays"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  RecaptchaKmsKey:
    Type: "AWS::KMS::Key"
    Properties:
      Description:
        Fn::Sub: "KMS key for encrypting reCAPTCHA secrets in ${AppName}"
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              AWS:
                Fn::Sub: "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action:
              - "kms:CancelKeyDeletion"
              - "kms:CreateAlias"
              - "kms:CreateGrant"
              - "kms:Decrypt"
              - "kms:DeleteAlias"
              - "kms:DescribeKey"
              - "kms:DisableKey"
              - "kms:DisableKeyRotation"
              - "kms:EnableKey"
              - "kms:EnableKeyRotation"
              - "kms:Encrypt"
              - "kms:GenerateDataKey"
              - "kms:GenerateDataKeyPair"
              - "kms:GenerateDataKeyPairWithoutPlaintext"
              - "kms:GenerateDataKeyWithoutPlaintext"
              - "kms:GetKeyPolicy"
              - "kms:GetKeyRotationStatus"
              - "kms:GetPublicKey"
              - "kms:ListGrants"
              - "kms:ListResourceTags"
              - "kms:PutKeyPolicy"
              - "kms:ReEncryptFrom"
              - "kms:ReEncryptTo"
              - "kms:RetireGrant"
              - "kms:RevokeGrant"
              - "kms:ScheduleKeyDeletion"
              - "kms:Sign"
              - "kms:TagResource"
              - "kms:UntagResource"
              - "kms:UpdateAlias"
              - "kms:UpdateKeyDescription"
              - "kms:Verify"
            Resource: "*"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "RecaptchaKmsKeyTemplateEnabledCondition"
  RecaptchaKmsKeyAlias:
    Type: "AWS::KMS::Alias"
    Properties:
      AliasName:
        Fn::Sub: "alias/${AppName}-recaptcha-key"
      TargetKeyId:
        Ref: "RecaptchaKmsKey"
    Condition: "RecaptchaKmsKeyAliasTemplateEnabledCondition"
  ApiGatewayCloudWatchLogsRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service: "apigateway.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        -
          Fn::Sub: "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    Condition: "TemplateEnabled"
  ApiGatewayAccountConfig:
    Type: "Custom::ApiGatewayAccount"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CustomResourceManager"
          - "Arn"
      CloudWatchRoleArn:
        Fn::GetAtt:
          - "ApiGatewayCloudWatchLogsRole"
          - "Arn"
    Condition: "TemplateEnabled"
  RestApi:
    Type: "AWS::ApiGateway::RestApi"
    Properties:
      Name:
        Fn::Sub: "${AppName}-rest-api"
      Description:
        Fn::Sub: "${AppName} REST API"
      EndpointConfiguration:
        Types:
          - "REGIONAL"
      Tags:
        -
          Key: "aws-apn-id"
          Value:
            Ref: "PrmTagValue"
    DependsOn:
      - "ApiGatewayAccountConfig"
    Condition: "TemplateEnabled"
  FrontendCognitoAuth:
    Type: "Custom::ApiAuthorizer"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CustomResourceManager"
          - "Arn"
      Name:
        Fn::Sub: "${AppName}-frontend-cognito-auth"
      Type: "COGNITO_USER_POOLS"
      RestApiId:
        Ref: "RestApi"
      IdentitySource: "method.request.header.Authorization"
      ProviderARNs:
        -
          Fn::Sub: "arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${FrontendCognitoUserPoolId}"
      AuthorizerResultTtlInSeconds: 300
    Condition: "FrontendCognitoAuthTemplateEnabledCondition"
