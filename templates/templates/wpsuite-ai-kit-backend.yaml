  WebACL:
    Type: "Custom::WafWebACL"
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - "CustomResourceManager"
          - "Arn"
      Name:
        Fn::Sub: "${AppName}-web-acl"
      Description: "WAF protection for REST API endpoints with endpoint-based IP filtering"
      Scope: "REGIONAL"
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName:
          Fn::Sub: "${AppName}-web-acl"
      Rules:
        -
          Fn::If:
            - "HasBlockedIPs"
            -
              Name: "BlockMaliciousIPs"
              Priority: 100
              Statement:
                IPSetReferenceStatement:
                  ARN:
                    Fn::GetAtt:
                      - "BlockedIPSet"
                      - "IPSetArn"
              Action:
                Block: {}
              VisibilityConfig:
                SampledRequestsEnabled: true
                CloudWatchMetricsEnabled: true
                MetricName:
                  Fn::Sub: "${AppName}-blocked-ips"
            -
              Ref: "AWS::NoValue"
        -
          Fn::If:
            - "HasAdminAllowedIPs"
            -
              Name: "DenyAdminEndpointsIfNotInAllowlist"
              Priority: 200
              Statement:
                AndStatement:
                  Statements:
                    -
                      NotStatement:
                        Statement:
                          IPSetReferenceStatement:
                            ARN:
                              Fn::GetAtt:
                                - "AdminAllowedIPSet"
                                - "IPSetArn"
                    -
                      ByteMatchStatement:
                        SearchString: "/admin"
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          -
                            Priority: 0
                            Type: "NONE"
                        PositionalConstraint: "STARTS_WITH"
              Action:
                Block: {}
              VisibilityConfig:
                SampledRequestsEnabled: true
                CloudWatchMetricsEnabled: true
                MetricName:
                  Fn::Sub: "${AppName}-admin-blocked"
            -
              Ref: "AWS::NoValue"
        -
          Fn::If:
            - "HasPublicAllowedIPs"
            -
              Name: "DenyPublicEndpointsIfNotInAllowlist"
              Priority: 300
              Statement:
                AndStatement:
                  Statements:
                    -
                      NotStatement:
                        Statement:
                          IPSetReferenceStatement:
                            ARN:
                              Fn::GetAtt:
                                - "PublicAllowedIPSet"
                                - "IPSetArn"
                    -
                      ByteMatchStatement:
                        SearchString: "/frontend"
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          -
                            Priority: 0
                            Type: "NONE"
                        PositionalConstraint: "STARTS_WITH"
              Action:
                Block: {}
              VisibilityConfig:
                SampledRequestsEnabled: true
                CloudWatchMetricsEnabled: true
                MetricName:
                  Fn::Sub: "${AppName}-public-blocked"
            -
              Ref: "AWS::NoValue"
        -
          Name: "AWSManagedRulesCommonRuleSet"
          Priority: 400
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: "AWS"
              Name: "AWSManagedRulesCommonRuleSet"
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName:
              Fn::Sub: "${AppName}-common-rules"
        -
          Name: "AWSManagedRulesKnownBadInputsRuleSet"
          Priority: 500
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: "AWS"
              Name: "AWSManagedRulesKnownBadInputsRuleSet"
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName:
              Fn::Sub: "${AppName}-bad-inputs"
        -
          Name: "AWSManagedRulesAmazonIpReputationList"
          Priority: 600
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: "AWS"
              Name: "AWSManagedRulesAmazonIpReputationList"
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName:
              Fn::Sub: "${AppName}-ip-reputation"
        -
          Name: "RateLimitFrontendEndpoints"
          Priority: 700
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: "IP"
              ScopeDownStatement:
                ByteMatchStatement:
                  SearchString: "/frontend"
                  FieldToMatch:
                    UriPath: {}
                  TextTransformations:
                    -
                      Priority: 0
                      Type: "NONE"
                  PositionalConstraint: "STARTS_WITH"
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName:
              Fn::Sub: "${AppName}-frontend-rate-limit"
        -
          Name: "RateLimitAdminEndpoints"
          Priority: 800
