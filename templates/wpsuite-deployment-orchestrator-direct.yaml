AWSTemplateFormatVersion: "2010-09-09"
Description: "WP Suite Deployment Access direct root orchestration template for WP Suite console launches"
Parameters:
  MPS3BucketName:
    Type: "String"
    Default: "wpsuite-artifacts-637423296378-us-east-1-an"
    Description: "Public S3 bucket that contains the reviewed WP Suite CloudFormation templates."
  MPS3BucketRegion:
    Type: "String"
    Default: "us-east-1"
    Description: "Marketplace-provided bucket region that contains the reviewed WP Suite templates."
  MPS3KeyPrefix:
    Type: "String"
    Default: "releases/v1.0.15/templates/templates"
    Description: "S3 key prefix for the reviewed WP Suite nested CloudFormation templates."
  WpSuiteDeploymentSecretArn:
    Type: "String"
    Description: "AWS Marketplace Deployment Service secret ARN containing the WP Suite deployment context."
    MinLength: 1
    NoEcho: true
  DeploymentContextMode:
    Type: "String"
    Default: "direct"
    AllowedValues:
      - "marketplace_secret"
      - "direct"
    Description: "How the root template receives the WP Suite deployment context."
  WpSuiteDeploymentId:
    Type: "String"
    Default: ""
    Description: "Direct deployment session ID used by agency-credit CloudFormation launches."
    NoEcho: true
  WpSuiteDeploymentNonce:
    Type: "String"
    Default: ""
    Description: "Direct deployment nonce used by agency-credit CloudFormation launches."
    NoEcho: true
  WpSuiteExpectedAwsAccountId:
    Type: "String"
    Default: ""
    Description: "Expected buyer AWS account ID."
  WpSuiteSellerArtifactDeployerRoleArn:
    Type: "String"
    Default: "arn:aws:iam::637423296378:role/wpsuite-prod-marketplace-artifact-deployer"
    Description: "WP Suite seller-side IAM role ARN that is allowed to assume the buyer artifact ingress role."
  WpSuiteBackendApiBaseUrl:
    Type: "String"
    Default: "https://api.wpsuite.io/marketplace"
    Description: "WP Suite Marketplace backend API base URL."
  TemplateVersion:
    Type: "String"
    Default: "v1.0.15"
    Description: "Immutable WP Suite deployment template version."
  DeployCognito:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite Cognito identity foundation."
  DeployAiKitBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite AI Kit backend."
  DeployFlowBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite Flow backend."
  DeployStaticGuardian:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy WP Suite Static Site Guardian."
  EnableAlerts:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable shared SNS email alerting for selected WP Suite backends."
  AlertEmailAddress1:
    Type: "String"
    Default: ""
    Description: "Alert email recipient 1. Leave empty when unused."
  AlertEmailAddress2:
    Type: "String"
    Default: ""
    Description: "Alert email recipient 2. Leave empty when unused."
  AlertEmailAddress3:
    Type: "String"
    Default: ""
    Description: "Alert email recipient 3. Leave empty when unused."
  AlertEmailAddress4:
    Type: "String"
    Default: ""
    Description: "Alert email recipient 4. Leave empty when unused."
  AlertEmailAddress5:
    Type: "String"
    Default: ""
    Description: "Alert email recipient 5. Leave empty when unused."
  StaticGuardianDomainName:
    Type: "String"
    Default: ""
    Description: "Custom domain for the Static Site Guardian CloudFront distribution."
  StaticGuardianCertificateArn:
    Type: "String"
    Default: ""
    Description: "ACM certificate ARN in us-east-1 for the Static Site Guardian CloudFront distribution."
  StaticGuardianProtectedPaths:
    Type: "String"
    Default: "/restricted"
    Description: "Comma-separated protected paths for Static Site Guardian."
  StaticGuardianSigninPagePath:
    Type: "String"
    Default: "/signin"
    Description: "Sign-in path used by Static Site Guardian."
  CognitoPostLoginRedirectUrl:
    Type: "String"
    Default: "https://example.com/signin"
    Description: "OAuth callback URL for the Cognito app client."
  CognitoRegisteredGroupName:
    Type: "String"
    Default: "registered"
    Description: "Default Cognito group assigned to confirmed users."
  CognitoAdminGroupName:
    Type: "String"
    Default: "admin"
    Description: "Cognito administrator group name."
  CognitoCreateIdentityPool:
    Type: "String"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create a Cognito Identity Pool in the Cognito nested stack."
  CognitoEnableCustomEmailSender:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable the Cognito custom email sender Lambda."
  CognitoEnableRecaptcha:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable reCAPTCHA in Cognito pre sign-up."
  RecaptchaMode:
    Type: "String"
    Default: "enterprise"
    AllowedValues:
      - "enterprise"
      - "classic"
    Description: "Shared reCAPTCHA mode used by selected WP Suite nested stacks."
  RecaptchaProjectId:
    Type: "String"
    Default: ""
    Description: "Google Cloud project ID for reCAPTCHA Enterprise."
  RecaptchaSiteKey:
    Type: "String"
    Default: ""
    Description: "Public reCAPTCHA site key expected by frontend clients."
  RecaptchaSecretKey:
    Type: "String"
    Default: ""
    Description: "Shared reCAPTCHA secret key used by selected WP Suite nested stacks."
    NoEcho: true
  RecaptchaScoreThreshold:
    Type: "Number"
    Default: 0.5
    Description: "Minimum accepted reCAPTCHA score from 0.0 to 1.0."
  RecaptchaChatTtlSeconds:
    Type: "Number"
    Default: 120
    Description: "AI Kit chat reCAPTCHA verification cache TTL in seconds."
  AiKitEnvironment:
    Type: "String"
    Default: "prod"
    Description: "Deployment environment for the WP Suite AI Kit nested stack."
  AiKitAdminApiAuthMode:
    Type: "String"
    Default: "IAM"
    Description: "AI Kit admin API authorization mode."
  AiKitAdminCognitoAuthScopes:
    Type: "String"
    Default: ""
    Description: "Optional OAuth scopes required for AI Kit admin Cognito authorization."
  AiKitFrontendApiAuthMode:
    Type: "String"
    Default: "NONE"
    Description: "AI Kit frontend API authorization mode."
  AiKitFrontendCognitoAuthScopes:
    Type: "String"
    Default: ""
    Description: "Optional OAuth scopes required for AI Kit frontend Cognito authorization."
  AiKitFrontendModelId:
    Type: "String"
    Default: "amazon.nova-lite-v1:0"
    Description: "Bedrock model ID used by AI Kit frontend endpoints."
  AiKitModelId:
    Type: "String"
    Default: "amazon.nova-lite-v1:0"
    Description: "Bedrock model ID used by AI Kit admin/backend endpoints."
  AiKitKnowledgeBaseId:
    Type: "String"
    Default: ""
    Description: "Existing Bedrock Knowledge Base ID for AI Kit, or empty to create one."
  AiKitEnableChatbotBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable AI Kit chatbot frontend endpoint."
  AiKitEnableSummarizerBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable AI Kit summarizer frontend endpoint."
  AiKitEnableLanguageAIBackend:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable AI Kit language assistant frontend endpoints."
  AiKitEnableRecaptcha:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable reCAPTCHA for AI Kit frontend APIs."
  AiKitEnableWAF:
    Type: "String"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable AWS WAF for AI Kit APIs."
  FlowEnvironment:
    Type: "String"
    Default: "prod"
    Description: "Deployment environment for the WP Suite Flow nested stack."
  FlowFrontendApiAuthMode:
    Type: "String"
    Default: "NONE"
    Description: "Flow frontend API authorization mode."
  FlowAdminApiAuthMode:
    Type: "String"
    Default: "COGNITO"
    Description: "Flow admin API authorization mode."
  FlowAdminCognitoAuthScopes:
    Type: "String"
    Default: ""
    Description: "Optional OAuth scopes required for Flow admin Cognito authorization."
  FlowPayloadBucketName:
    Type: "String"
    Default: ""
    Description: "Existing S3 bucket for Flow payload uploads, or empty to create one."
  FlowTemplatesBucketName:
    Type: "String"
    Default: ""
    Description: "Existing S3 bucket for Flow templates, or empty to create one."
  FlowFromEmail:
    Type: "String"
    Default: ""
    Description: "SES-verified sender email address for Flow outbound email actions."
  FlowEnableRecaptcha:
    Type: "String"
    Default: "false"
