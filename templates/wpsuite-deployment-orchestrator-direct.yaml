Mappings:
  WpSuiteMarketplace:
    DeploymentAccess:
      ProductCode: "5d8wq5hg1d54kb933ntenntiu"
Conditions:
  CondUseMarketplaceSecret:
    Fn::Equals:
      -
        Ref: "DeploymentContextMode"
      - "marketplace_secret"
Resources:
  DeploymentArtifactBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          -
            ServerSideEncryptionByDefault:
              SSEAlgorithm: "AES256"
      LifecycleConfiguration:
        Rules:
          -
            ExpirationInDays: 30
            Id: "ExpireStagedArtifacts"
            Status: "Enabled"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        -
          Key: "aws-apn-id"
          Value: "pc:5d8wq5hg1d54kb933ntenntiu"
  DeploymentArtifactBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket:
        Ref: "DeploymentArtifactBucket"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Sid: "DenyInsecureTransport"
            Effect: "Deny"
